<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARKET DASHBOARD</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9932A;--gold-l:#E8B84B;--gold-d:#7A5510;--gold-dim:#3D2A08;
  --bg:#060504;--s1:#0C0A06;--s2:#130F07;--border:#1E1708;
  --txt:#D4C080;--txt-d:#5A4E24;--txt-dd:#2E2710;
  --up:#3DAA62;--dn:#C44040;
  --poc:#E8B84B;--vah:#5A8F6A;--val:#8F5A5A;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace;overflow:hidden}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 150 150' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.025'/%3E%3C/svg%3E");}
.app{display:flex;flex-direction:column;height:100vh;padding:8px 10px;gap:6px}

/* ── INSTRUMENT TABS ── */
.inst-row{display:flex;gap:3px;flex-shrink:0;align-items:center}
.inst-tab{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;
  padding:3px 16px;border:1px solid var(--border);border-radius:2px;cursor:pointer;
  transition:.1s;color:var(--txt-d);background:none}
.inst-tab:hover{color:var(--txt)}
.inst-tab[data-id="gold"].on  {color:#060504;background:linear-gradient(110deg,#7A5510,#C9932A);border-color:#C9932A}
.inst-tab[data-id="silver"].on{color:#060504;background:linear-gradient(110deg,#404058,#9090C0);border-color:#9090C0}
.inst-tab[data-id="btc"].on   {color:#060504;background:linear-gradient(110deg,#7A4A0D,#F7931A);border-color:#F7931A}
.inst-tab[data-id="all"].on   {color:#D4C080;background:rgba(90,78,36,0.2);border-color:var(--gold-d)}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;gap:12px;height:38px;flex-shrink:0}
.sym{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:5px;line-height:1;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sym-gold  {background:linear-gradient(110deg,var(--gold-d),var(--gold),var(--gold-l),var(--gold))}
.sym-silver{background:linear-gradient(110deg,#505070,#A0A0C8,#D0D0E8)}
.sym-btc   {background:linear-gradient(110deg,#7A4A0D,#F7931A,#FFBB44)}
.sep{width:1px;height:22px;background:var(--border)}
.price-big{font-size:22px;font-weight:500;letter-spacing:1px}
.price-chg{font-size:11px;padding:2px 7px;border-radius:2px}
.up-bg{background:rgba(61,170,98,0.15);color:var(--up)}.dn-bg{background:rgba(196,64,64,0.15);color:var(--dn)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.session{font-size:9px;letter-spacing:2px;color:var(--gold-d);border:1px solid var(--border);padding:3px 9px;border-radius:2px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--up);box-shadow:0 0 6px var(--up);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.clk{font-size:11px;color:var(--txt-d)}

/* ── TF ROW ── */
.tfrow{display:flex;gap:4px;align-items:center;flex-shrink:0}
.tfl{font-size:9px;color:var(--txt-d);letter-spacing:2px;margin-right:4px}
.tf{background:none;border:1px solid var(--border);color:var(--txt-d);font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 10px;cursor:pointer;border-radius:2px;transition:.1s}
.tf:hover{border-color:var(--gold-d);color:var(--gold)}
.tf.on{border-color:var(--gold);color:var(--gold);background:rgba(201,147,42,.07)}
.tf-toggle{background:none;border:1px solid var(--border);color:var(--txt-d);font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 10px;cursor:pointer;border-radius:2px;transition:.1s;margin-left:2px}
.tf-toggle:hover{border-color:var(--gold-d);color:var(--gold)}
.tf-toggle.on{border-color:var(--gold);color:var(--gold);background:rgba(201,147,42,.07)}
.reload-btn{margin-left:auto;background:none;border:1px solid var(--border);color:var(--txt-d);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;padding:3px 10px;cursor:pointer;border-radius:2px;transition:.1s}
.reload-btn:hover{border-color:var(--gold-d);color:var(--gold)}
.copy-btn{background:none;border:1px solid var(--border);color:var(--txt-d);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;padding:3px 10px;cursor:pointer;border-radius:2px;transition:.15s}
.copy-btn:hover{border-color:var(--gold-d);color:var(--gold)}
.copy-btn.ok{border-color:var(--up);color:var(--up)}.copy-btn.err{border-color:var(--dn);color:var(--dn)}

/* ── CHART AREA (single) ── */
.chart-area{flex:1;min-height:0;position:relative;border:1px solid var(--border);border-radius:3px;overflow:hidden}
.chart-area::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-d),transparent);z-index:1;pointer-events:none}
#lw{position:absolute;inset:0}
#vp-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:10}
.legend{position:absolute;bottom:8px;left:8px;z-index:20;display:flex;flex-direction:column;gap:3px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:1px;color:var(--txt-d)}
.leg-dot{width:10px;height:3px;border-radius:1px}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:rgba(6,5,4,.85);z-index:50;pointer-events:none}
.overlay.hidden{display:none}
.ov-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--gold-d)}
.ov-sub{font-size:10px;color:var(--txt-d);letter-spacing:1px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SCORE PANEL ── */
.score-panel{position:absolute;left:8px;bottom:8px;z-index:30;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.score-panel.hidden .score-card{display:none}
.score-toggle-btn{background:rgba(6,5,4,.85);border:1px solid var(--border);color:var(--txt-d);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;padding:3px 10px;cursor:pointer;border-radius:2px;pointer-events:all;transition:.15s;align-self:flex-start}
.score-toggle-btn:hover,.score-toggle-btn.on{border-color:var(--gold-d);color:var(--gold)}
.score-card{background:rgba(6,5,4,.88);border:1px solid var(--border);border-radius:3px;padding:6px 10px;min-width:160px;pointer-events:all}
.score-card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sc-label{font-size:9px;letter-spacing:2px;color:var(--txt-d)}
.sc-badge{font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:1px 7px;border-radius:2px}
.sc-bull{background:rgba(61,170,98,.18);color:#3DAA62}.sc-bear{background:rgba(196,64,64,.18);color:#C44040}.sc-neu{background:rgba(90,78,36,.3);color:var(--txt-d)}
.score-bar-wrap{height:5px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px}
.score-bar{height:100%;border-radius:2px;transition:width .4s}
.sc-range{font-size:9px;color:var(--txt-d);margin-top:3px}

/* ── ALERT ── */
.alert-panel{flex-shrink:0;background:var(--s1);border:1px solid var(--border);border-radius:3px;overflow:hidden;max-height:28px;transition:max-height .25s ease}
.alert-panel.open{max-height:160px}
.alert-toggle{display:flex;align-items:center;gap:10px;padding:6px 14px;cursor:pointer;user-select:none}
.alert-toggle-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
.alert-body{padding:0 14px 12px;display:flex;flex-direction:column;gap:8px}
.alert-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.alert-input{background:var(--bg);border:1px solid var(--border);color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 8px;border-radius:2px;width:90px}
.alert-input:focus{outline:none;border-color:var(--gold-d)}
.alert-add-btn{background:none;border:1px solid var(--gold-d);color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;padding:4px 12px;cursor:pointer;border-radius:2px;transition:.1s}
.alert-add-btn:hover{background:rgba(201,147,42,.1)}
.alert-list{display:flex;flex-wrap:wrap;gap:5px}
.alert-tag{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:10px;border:1px solid var(--border);border-radius:2px;padding:2px 8px;color:var(--txt-d)}
.alert-tag.fired{border-color:var(--gold);color:var(--gold);box-shadow:0 0 8px rgba(201,147,42,.3)}
.alert-tag button{background:none;border:none;color:var(--txt-dd);cursor:pointer;font-size:10px;padding:0}
.alert-tag button:hover{color:var(--dn)}
.alert-hint{font-size:9px;color:var(--txt-d);letter-spacing:1px}

/* ── STATUS BAR ── */
.statusbar{flex-shrink:0;display:flex;align-items:center;gap:16px;height:22px;border-top:1px solid var(--border);padding-top:4px}
.stat{font-size:9px;letter-spacing:1px;color:var(--txt-d)}
.stat span{color:var(--txt);margin-left:4px}
#status-msg{margin-left:auto;font-size:9px;color:var(--txt-d)}

/* ── ALL VIEW ── */
.all-grid{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto 1fr;gap:6px 8px}
.mini-wrap{display:flex;flex-direction:column;gap:4px;min-height:0;overflow:hidden}
.mini-hdr{flex-shrink:0;display:flex;align-items:center;gap:8px}
.mini-sym{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px}
.mini-price{font-size:13px;font-weight:500}
.mini-chg{font-size:10px;padding:1px 6px;border-radius:2px}
.mini-area{flex:1;min-height:0;position:relative;border:1px solid var(--border);border-radius:3px;overflow:hidden;cursor:pointer}
.mini-area:hover{border-color:var(--gold-d)}
.mini-area::after{content:'↗ FULL';position:absolute;top:5px;right:6px;font-size:8px;color:var(--txt-dd);letter-spacing:1px}
.mini-area:hover::after{color:var(--gold-d)}

.d-none{display:none!important}
</style>
</head>
<body>
<div class="app">

  <!-- INSTRUMENT TABS -->
  <div class="inst-row">
    <button class="inst-tab on" data-id="gold"   onclick="switchInst('gold',this)">GOLD</button>
    <button class="inst-tab"    data-id="silver" onclick="switchInst('silver',this)">SILVER</button>
    <button class="inst-tab"    data-id="btc"    onclick="switchInst('btc',this)">BTC</button>
    <button class="inst-tab"    data-id="all"    onclick="switchInst('all',this)">ALL</button>
  </div>

  <!-- HEADER (single view) -->
  <div class="hdr" id="mainHdr">
    <div class="sym sym-gold" id="symLabel">GOLD</div>
    <div class="sep"></div>
    <div class="price-big" id="pMain" style="color:var(--gold-l)">—</div>
    <div class="price-chg" id="pChg">—</div>
    <div class="hdr-right">
      <div class="session" id="sessBadge">—</div>
      <div class="dot"></div>
      <div class="clk" id="clk">—</div>
    </div>
  </div>

  <!-- TF ROW (single view) -->
  <div class="tfrow" id="mainTfrow">
    <span class="tfl">TF</span>
    <button class="tf" onclick="setTF('1m',this)">1m</button>
    <button class="tf on" onclick="setTF('5m',this)">5m</button>
    <button class="tf" onclick="setTF('15m',this)">15m</button>
    <button class="tf" onclick="setTF('1h',this)">1H</button>
    <button class="tf" onclick="setTF('4h',this)">4H</button>
    <button class="tf" onclick="setTF('1d',this)">1D</button>
    <button class="tf" onclick="setTF('1wk',this)">1W</button>
    <button class="tf-toggle on" id="togOB"  onclick="toggleLayer('OB',this)">OB</button>
    <button class="tf-toggle on" id="togFVG" onclick="toggleLayer('FVG',this)">FVG</button>
    <button class="reload-btn" onclick="reloadCurrent()">↺ RELOAD</button>
    <button class="copy-btn" id="copyBtn" onclick="copyChart()">📋 コピー</button>
  </div>

  <!-- SINGLE CHART AREA -->
  <div class="chart-area" id="chartArea">
    <div id="lw"></div>
    <canvas id="vp-canvas"></canvas>
    <div class="score-panel" id="scorePanel">
      <button class="score-toggle-btn on" id="scorePanelBtn" onclick="toggleScorePanel()">★ SCORE</button>
    </div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--poc)"></div>POC</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--vah)"></div>VAH</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--val)"></div>VAL</div>
      <div class="leg-item" style="margin-top:4px"><div class="leg-dot" style="background:rgba(100,160,255,.7)"></div>Bull OB</div>
      <div class="leg-item"><div class="leg-dot" style="background:rgba(255,120,120,.7)"></div>Bear OB</div>
      <div class="leg-item"><div class="leg-dot" style="background:rgba(100,220,160,.5)"></div>Bull FVG</div>
      <div class="leg-item"><div class="leg-dot" style="background:rgba(220,100,100,.5)"></div>Bear FVG</div>
    </div>
    <div class="overlay" id="overlay">
      <div class="spinner"></div>
      <div class="ov-title">LOADING</div>
      <div class="ov-sub" id="ov-sub">データ取得中...</div>
    </div>
  </div>

  <!-- ALERT -->
  <div class="alert-panel" id="alertPanel">
    <div class="alert-toggle" onclick="toggleAlert()">
      <div class="alert-toggle-lbl">🔔 アラート設定</div>
      <div style="margin-left:auto;font-size:10px;color:var(--txt-d)" id="alertArrow">▼</div>
    </div>
    <div class="alert-body">
      <div class="alert-row">
        <input class="alert-input" id="alertPrice" type="number" placeholder="価格 例: 5200" step="0.1">
        <select class="alert-input" id="alertDir" style="width:80px">
          <option value="cross">クロス</option>
          <option value="above">↑上抜け</option>
          <option value="below">↓下抜け</option>
        </select>
        <button class="alert-add-btn" onclick="addAlert()">＋ 追加</button>
        <span class="alert-hint" id="alertHint"></span>
      </div>
      <div class="alert-list" id="alertList"></div>
    </div>
  </div>

  <!-- ALL VIEW -->
  <div class="all-grid d-none" id="allGrid">
    <!-- ALL toolbar -->
    <div class="tfrow" id="allTfrow" style="grid-column:1/-1;flex-shrink:0">
      <span class="tfl">TF</span>
      <button class="tf" onclick="setTFAll('1m',this)">1m</button>
      <button class="tf on" id="allTf5m" onclick="setTFAll('5m',this)">5m</button>
      <button class="tf" onclick="setTFAll('15m',this)">15m</button>
      <button class="tf" onclick="setTFAll('1h',this)">1H</button>
      <button class="tf" onclick="setTFAll('4h',this)">4H</button>
      <button class="tf" onclick="setTFAll('1d',this)">1D</button>
      <button class="tf" onclick="setTFAll('1wk',this)">1W</button>
      <button class="reload-btn" onclick="reloadAll()">↺ RELOAD</button>
      <button class="copy-btn" id="copyBtnAll" onclick="copyAllChart()">📋 コピー</button>
    </div>
    <div class="mini-wrap">
      <div class="mini-hdr">
        <div class="mini-sym sym-gold">GOLD</div>
        <div class="mini-price sym-gold" id="allPg">—</div>
        <div class="mini-chg" id="allCg">—</div>
      </div>
      <div class="mini-area" id="miniAreaGold" onclick="switchInst('gold',document.querySelector('[data-id=gold]'))">
        <div id="miniLwGold" style="position:absolute;inset:0"></div>
      </div>
    </div>
    <div class="mini-wrap">
      <div class="mini-hdr">
        <div class="mini-sym sym-silver">SILVER</div>
        <div class="mini-price sym-silver" id="allPs">—</div>
        <div class="mini-chg" id="allCs">—</div>
      </div>
      <div class="mini-area" id="miniAreaSilver" onclick="switchInst('silver',document.querySelector('[data-id=silver]'))">
        <div id="miniLwSilver" style="position:absolute;inset:0"></div>
      </div>
    </div>
    <div class="mini-wrap">
      <div class="mini-hdr">
        <div class="mini-sym sym-btc">BTC</div>
        <div class="mini-price sym-btc" id="allPb">—</div>
        <div class="mini-chg" id="allCb">—</div>
      </div>
      <div class="mini-area" id="miniAreaBtc" onclick="switchInst('btc',document.querySelector('[data-id=btc]'))">
        <div id="miniLwBtc" style="position:absolute;inset:0"></div>
      </div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="statusbar">
    <div class="stat">HIGH <span id="stHigh">—</span></div>
    <div class="sep" style="height:14px"></div>
    <div class="stat">LOW <span id="stLow">—</span></div>
    <div class="sep" style="height:14px"></div>
    <div class="stat">POC <span id="stPOC">—</span></div>
    <div class="sep" style="height:14px"></div>
    <div class="stat">VAH <span id="stVAH">—</span></div>
    <div class="sep" style="height:14px"></div>
    <div class="stat">VAL <span id="stVAL">—</span></div>
    <div id="status-msg">起動中...</div>
  </div>

</div>
<script>
// ═══════════════════════════════════════════════════════════
//  INSTRUMENT CONFIG
// ═══════════════════════════════════════════════════════════
const INSTRUMENTS = {
  gold:   { sym:'XAUUSDT', name:'GOLD',   wsStream:'xauusdt', endpoint:'fapi', dp:2, accentL:'var(--gold-l)', symClass:'sym-gold',   allP:'allPg', allC:'allCg', miniLw:'miniLwGold'   },
  silver: { sym:'XAGUSDT', name:'SILVER', wsStream:'xagusdt', endpoint:'fapi', dp:4, accentL:'#C0C0D8',       symClass:'sym-silver', allP:'allPs', allC:'allCs', miniLw:'miniLwSilver' },
  btc:    { sym:'BTCUSDT', name:'BTC',    wsStream:'btcusdt', endpoint:'spot', dp:2, accentL:'#F7931A',       symClass:'sym-btc',    allP:'allPb', allC:'allCb', miniLw:'miniLwBtc'    },
};

// ═══════════════════════════════════════════════════════════
//  PER-INSTRUMENT STATE
// ═══════════════════════════════════════════════════════════
const STATE = {};
for (const id of ['gold','silver','btc']) {
  STATE[id] = {
    allCandles: [],
    vpData: { buckets:[], poc:null, vah:null, val:null },
    obData: [], fvgData: [],
    ws: null, wsReconnectTimer: null, wsFailCount: 0, pollingTimer: null,
    isFirstLoad: true,
    miniChart: null, miniSeries: null,
    lastPrice: null,
  };
}

// ─── Global chart state (single main chart) ───────────────
let chart = null, candleSeries = null, volSeries = null;
let currentInst = 'gold';
let currentTF   = '5m';
let showOB  = true;
let showFVG = true;
let vpBuckets = 60;
let vpData = { buckets:[], poc:null, vah:null, val:null };
let obData = [], fvgData = [];

const BN_INTERVAL = { '1m':'1m','5m':'5m','15m':'15m','1h':'1h','4h':'4h','1d':'1d','1wk':'1w' };
const BN_LIMIT    = { '1m':300,'5m':300,'15m':300,'1h':300,'4h':200,'1d':365,'1wk':200 };

// ═══════════════════════════════════════════════════════════
//  FETCH
// ═══════════════════════════════════════════════════════════
async function fetchBinance(instId, interval) {
  const cfg   = INSTRUMENTS[instId];
  const bnInt = BN_INTERVAL[interval] || '5m';
  const limit = BN_LIMIT[interval]    || 300;
  const sym   = cfg.sym;
  const endpoints = cfg.endpoint === 'fapi' ? [
    `https://fapi.binance.com/fapi/v1/klines?symbol=${sym}&interval=${bnInt}&limit=${limit}`,
    `https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${bnInt}&limit=${limit}`,
    `http://localhost:8001/klines?symbol=${sym}&interval=${bnInt}&limit=${limit}`,
  ] : [
    `https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${bnInt}&limit=${limit}`,
    `http://localhost:8001/klines?symbol=${sym}&interval=${bnInt}&limit=${limit}`,
  ];
  let lastErr;
  for (const url of endpoints) {
    try {
      const res  = await fetch(url);
      if (!res.ok) { lastErr=new Error('HTTP '+res.status); continue; }
      const rows = await res.json();
      if (!Array.isArray(rows)||!rows.length) { lastErr=new Error('empty'); continue; }
      return rows.map(r=>({ time:Math.floor(r[0]/1000), open:+r[1], high:+r[2], low:+r[3], close:+r[4], volume:+r[5] }));
    } catch(e) { lastErr=e; }
  }
  throw lastErr||new Error('all endpoints failed');
}

// ═══════════════════════════════════════════════════════════
//  WEBSOCKET
// ═══════════════════════════════════════════════════════════
function connectWS(instId) {
  const s   = STATE[instId];
  const cfg = INSTRUMENTS[instId];
  if (s.ws) { try{s.ws.close();}catch(e){} s.ws=null; }
  clearTimeout(s.wsReconnectTimer);
  if (s.wsFailCount >= 5) { startPolling(instId); return; }

  const bnInt = BN_INTERVAL[currentTF] || '5m';
  // BTC/SILVER use spot stream; GOLD uses fstream (futures)
  const wsUrl = cfg.endpoint === 'fapi'
    ? `wss://fstream.binance.com/ws/${cfg.wsStream}@kline_${bnInt}`
    : `wss://stream.binance.com:9443/ws/${cfg.wsStream}@kline_${bnInt}`;

  s.ws = new WebSocket(wsUrl);
  let opened = false;

  s.ws.onopen  = () => { opened=true; s.wsFailCount=0; stopPolling(instId); if(instId===currentInst) document.getElementById('status-msg').textContent='⚡ リアルタイム接続中'; };
  s.ws.onerror = () => {};
  s.ws.onclose = () => {
    if (!opened) s.wsFailCount++;
    const delay = opened ? 5000 : Math.min(3000*Math.pow(2,s.wsFailCount),30000);
    if (s.wsFailCount < 5) {
      if (instId===currentInst) document.getElementById('status-msg').textContent=`⚠ WS切断(${s.wsFailCount}/5) ${Math.round(delay/1000)}s後`;
      s.wsReconnectTimer = setTimeout(()=>connectWS(instId), delay);
    } else { startPolling(instId); }
  };
  s.ws.onmessage = (evt) => {
    try {
      const k = JSON.parse(evt.data).k;
      if (!k) return;
      const c = { time:Math.floor(k.t/1000), open:+k.o, high:+k.h, low:+k.l, close:+k.c, volume:+k.v };
      onWSCandle(instId, c);
    } catch(e) {}
  };
}

function startPolling(instId) {
  const s = STATE[instId];
  if (s.pollingTimer) return;
  if (instId===currentInst) document.getElementById('status-msg').textContent='↺ ポーリング (15s)';
  s.pollingTimer = setInterval(async()=>{
    try {
      const candles = await fetchBinance(instId, currentTF);
      if (candles.length) { STATE[instId].allCandles=candles; onWSCandle(instId,candles[candles.length-1]); }
    } catch(e){}
  }, 15000);
}
function stopPolling(instId) {
  const s=STATE[instId]; if(s.pollingTimer){clearInterval(s.pollingTimer);s.pollingTimer=null;}
}

function onWSCandle(instId, c) {
  const s   = STATE[instId];
  const cfg = INSTRUMENTS[instId];
  const dp  = cfg.dp;
  // Update candles array
  if (s.allCandles.length) {
    const last=s.allCandles[s.allCandles.length-1];
    if (last.time===c.time)      s.allCandles[s.allCandles.length-1]=c;
    else if (c.time>last.time)   s.allCandles.push(c);
  }
  // Update main chart if active
  if (instId===currentInst && candleSeries) {
    try{ candleSeries.update({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close}); }catch(e){}
    try{ volSeries.update({time:c.time,value:c.volume,color:c.close>=c.open?'rgba(61,170,98,.3)':'rgba(196,64,64,.3)'}); }catch(e){}
    const prev = s.allCandles[s.allCandles.length-2]||c;
    const chgAbs=c.close-prev.close; const chgPct=(chgAbs/prev.close*100).toFixed(2);
    document.getElementById('pMain').textContent=c.close.toFixed(dp);
    const chgEl=document.getElementById('pChg');
    chgEl.textContent=(chgAbs>=0?'+':'')+chgAbs.toFixed(dp)+' ('+chgPct+'%)';
    chgEl.className='price-chg '+(chgAbs>=0?'up-bg':'dn-bg');
    checkAlerts(c.close);
  }
  // Update mini chart
  if (s.miniSeries) { try{s.miniSeries.update({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close});}catch(e){} }
  // Update ALL view prices
  const prev2 = s.allCandles[s.allCandles.length-2]||c;
  const chg2  = c.close-prev2.close;
  const el    = document.getElementById(cfg.allP); if(el) el.textContent=c.close.toFixed(dp);
  const ec    = document.getElementById(cfg.allC);
  if(ec){ ec.textContent=(chg2>=0?'+':'')+chg2.toFixed(dp); ec.className='mini-chg '+(chg2>=0?'up-bg':'dn-bg'); }
  s.lastPrice = c.close;
  // Periodic recalc
  if (!onWSCandle._t) onWSCandle._t={};
  onWSCandle._t[instId]=(onWSCandle._t[instId]||0)+1;
  if (onWSCandle._t[instId]%30===0 && instId===currentInst) {
    vpData=calcVP(s.allCandles); obData=calcOB(s.allCandles); fvgData=calcFVG(s.allCandles);
  }
}

//  LOAD DATA (main chart)

async function loadData(instId) {
  instId = instId || currentInst;
  const s   = STATE[instId];
  const cfg = INSTRUMENTS[instId];
  const dp  = cfg.dp;
  if (instId===currentInst) showOverlay(true,'データ取得中...');
  try {
    const candles = await fetchBinance(instId, currentTF);
    s.allCandles = candles;
    vpData  = calcVP(candles); obData = calcOB(candles); fvgData = calcFVG(candles);
    // Feed main chart
    if (instId===currentInst && candleSeries) {
      candleSeries.setData(candles.map(c=>({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close})));
      volSeries.setData(candles.map(c=>({time:c.time,value:c.volume,color:c.close>=c.open?'rgba(61,170,98,.3)':'rgba(196,64,64,.3)'})));
      if (s.isFirstLoad) {
        const show={'1m':120,'5m':100,'15m':120,'1h':72,'4h':60,'1d':90,'1wk':60}[currentTF]||80;
        chart.timeScale().setVisibleLogicalRange({from:Math.max(0,candles.length-show),to:candles.length+2});
        s.isFirstLoad=false;
      } else {
        // fitContent on instrument switch to reset price scale to new instrument's range
        chart.timeScale().fitContent();
      }
      // Status bar
      const last=candles[candles.length-1]; const prev=candles[candles.length-2]||last;
      const chgAbs=last.close-prev.close; const chgPct=(chgAbs/prev.close*100).toFixed(2);
      document.getElementById('pMain').textContent=last.close.toFixed(dp);
      const chgEl=document.getElementById('pChg'); chgEl.textContent=(chgAbs>=0?'+':'')+chgAbs.toFixed(dp)+' ('+chgPct+'%)'; chgEl.className='price-chg '+(chgAbs>=0?'up-bg':'dn-bg');
      document.getElementById('stHigh').textContent=Math.max(...candles.map(c=>c.high)).toFixed(dp);
      document.getElementById('stLow').textContent =Math.min(...candles.map(c=>c.low)).toFixed(dp);
      document.getElementById('stPOC').textContent =vpData.poc?.toFixed(dp)?? '—';
      document.getElementById('stVAH').textContent =vpData.vah?.toFixed(dp)?? '—';
      document.getElementById('stVAL').textContent =vpData.val?.toFixed(dp)?? '—';
      document.getElementById('status-msg').textContent=candles.length+'本 取得完了';
      checkAlerts(last.close);
      showOverlay(false); requestAnimationFrame(drawVP);
    }
    // Feed mini chart
    if (s.miniSeries) { s.miniSeries.setData(candles.map(c=>({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close}))); s.miniChart?.timeScale().fitContent(); }
    // ALL view price update
    const last2=candles[candles.length-1]; const prev2=candles[candles.length-2]||last2;
    const chg2=last2.close-prev2.close;
    const pelm=document.getElementById(cfg.allP); if(pelm) pelm.textContent=last2.close.toFixed(dp);
    const celm=document.getElementById(cfg.allC); if(celm){ celm.textContent=(chg2>=0?'+':'')+chg2.toFixed(dp); celm.className='mini-chg '+(chg2>=0?'up-bg':'dn-bg'); }
  } catch(e) {
    if (instId===currentInst) showOverlay(true,'取得失敗: '+e.message,true);
  }
}

// ═══════════════════════════════════════════════════════════
//  CALC: OB  (exact copy from gold_vp.html)
// ═══════════════════════════════════════════════════════════
function calcOB(candles) {
  const obs=[]; const swing=3;
  for (let i=swing;i<candles.length-swing;i++) {
    const c=candles[i];
    if (c.close<c.open) {
      let impulse=0;
      for (let j=i+1;j<=i+swing;j++) impulse+=candles[j].close-candles[j].open;
      if (impulse>(c.open-c.close)*1.5) {
        const ob={type:'bull',top:c.open,bottom:c.low,mitigated:false};
        for (let j=i+1;j<candles.length;j++){if(candles[j].low<ob.bottom){ob.mitigated=true;break;}}
        obs.push(ob);
      }
    }
    if (c.close>c.open) {
      let impulse=0;
      for (let j=i+1;j<=i+swing;j++) impulse+=candles[j].open-candles[j].close;
      if (impulse>(c.close-c.open)*1.5) {
        const ob={type:'bear',top:c.high,bottom:c.open,mitigated:false};
        for (let j=i+1;j<candles.length;j++){if(candles[j].high>ob.top){ob.mitigated=true;break;}}
        obs.push(ob);
      }
    }
  }
  return obs.filter(o=>!o.mitigated).slice(-8);
}

// ═══════════════════════════════════════════════════════════
//  CALC: FVG  (exact copy)
// ═══════════════════════════════════════════════════════════
function calcFVG(candles) {
  const fvgs=[];
  for (let i=1;i<candles.length-1;i++) {
    const p=candles[i-1],c=candles[i],n=candles[i+1];
    if (n.low>p.high) {
      const fvg={type:'bull',top:n.low,bottom:p.high,mitigated:false};
      for (let j=i+1;j<candles.length;j++){if(candles[j].low<=fvg.bottom){fvg.mitigated=true;break;}}
      fvgs.push(fvg);
    }
    if (n.high<p.low) {
      const fvg={type:'bear',top:p.low,bottom:n.high,mitigated:false};
      for (let j=i+1;j<candles.length;j++){if(candles[j].high>=fvg.top){fvg.mitigated=true;break;}}
      fvgs.push(fvg);
    }
  }
  return fvgs.filter(f=>!f.mitigated).slice(-12);
}

// ═══════════════════════════════════════════════════════════
//  CALC: VP  (exact copy)
// ═══════════════════════════════════════════════════════════
function calcVP(candles) {
  if (!candles.length) return {buckets:[],poc:null,vah:null,val:null};
  const hi=Math.max(...candles.map(c=>c.high)); const lo=Math.min(...candles.map(c=>c.low));
  const step=(hi-lo)/vpBuckets; if (step<=0) return {buckets:[],poc:null,vah:null,val:null};
  const vols=new Float64Array(vpBuckets);
  for (const c of candles) {
    const b0=Math.max(0,Math.floor((c.low-lo)/step)); const b1=Math.min(vpBuckets-1,Math.floor((c.high-lo)/step));
    const vpp=c.volume/(b1-b0+1); for (let i=b0;i<=b1;i++) vols[i]+=vpp;
  }
  const maxVol=Math.max(...vols); const totalVol=vols.reduce((a,b)=>a+b,0); const pocIdx=Array.from(vols).indexOf(maxVol);
  let vaVol=vols[pocIdx],va0=pocIdx,va1=pocIdx;
  while (vaVol<totalVol*0.70&&(va0>0||va1<vpBuckets-1)) {
    const up=va1<vpBuckets-1?vols[va1+1]:0; const dn=va0>0?vols[va0-1]:0;
    if (up>=dn){va1++;vaVol+=vols[va1];}else{va0--;vaVol+=vols[va0];}
  }
  const buckets=Array.from(vols).map((v,i)=>({ priceFrom:lo+i*step, priceTo:lo+(i+1)*step, priceMid:lo+(i+.5)*step, volume:v, ratio:maxVol>0?v/maxVol:0, isPOC:i===pocIdx, inVA:i>=va0&&i<=va1 }));
  return { buckets, poc:lo+(pocIdx+.5)*step, vah:lo+(va1+1)*step, val:lo+va0*step };
}

// ═══════════════════════════════════════════════════════════
//  VP CANVAS DRAW  (exact copy)
// ═══════════════════════════════════════════════════════════
function getPaneOffset() {
  const lwDiv=document.getElementById('lw'); const lwCanvases=lwDiv.querySelectorAll('canvas');
  if (!lwCanvases.length) return 0;
  const areaRect=document.getElementById('chartArea').getBoundingClientRect();
  const paneRect=lwCanvases[0].getBoundingClientRect();
  return Math.round(paneRect.top-areaRect.top);
}
function resizeVPCanvas() {
  const area=document.getElementById('chartArea'); const cvs=document.getElementById('vp-canvas');
  cvs.width=area.offsetWidth; cvs.height=area.offsetHeight;
}
function drawVP() {
  const cvs=document.getElementById('vp-canvas'); const ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,cvs.width,cvs.height);
  if (!vpData.buckets.length||!candleSeries) return;
  const paneOY=getPaneOffset(); ctx.save(); ctx.translate(0,paneOY);
  const maxW=cvs.width*0.18;
  for (const b of vpData.buckets) {
    const y0=candleSeries.priceToCoordinate(b.priceTo); const y1=candleSeries.priceToCoordinate(b.priceFrom);
    if (y0==null||y1==null) continue;
    const barH=Math.max(1,y1-y0); const barW=b.ratio*maxW;
    ctx.fillStyle=b.isPOC?'rgba(232,184,75,.55)':b.inVA?'rgba(80,120,80,.25)':'rgba(60,50,20,.30)';
    ctx.fillRect(0,y0,barW,barH);
  }
  if (vpData.poc!=null){const y=candleSeries.priceToCoordinate(vpData.poc);if(y!=null){ctx.strokeStyle='rgba(232,184,75,.8)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cvs.width*.8,y);ctx.stroke();}}
  if (vpData.vah!=null){const y=candleSeries.priceToCoordinate(vpData.vah);if(y!=null){ctx.strokeStyle='rgba(90,143,106,.6)';ctx.setLineDash([3,6]);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cvs.width*.8,y);ctx.stroke();}}
  if (vpData.val!=null){const y=candleSeries.priceToCoordinate(vpData.val);if(y!=null){ctx.strokeStyle='rgba(143,90,90,.6)';ctx.setLineDash([3,6]);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cvs.width*.8,y);ctx.stroke();}}
  ctx.setLineDash([]);
  if (showOB) for (const ob of obData) {
    const yTop=candleSeries.priceToCoordinate(ob.top); const yBot=candleSeries.priceToCoordinate(ob.bottom);
    if (yTop==null||yBot==null) continue;
    const h=Math.max(2,yBot-yTop);
    ctx.fillStyle  =ob.type==='bull'?'rgba(100,160,255,.10)':'rgba(255,120,120,.10)';
    ctx.strokeStyle=ob.type==='bull'?'rgba(100,160,255,.60)':'rgba(255,120,120,.60)';
    ctx.fillRect(cvs.width*.20,yTop,cvs.width*.78,h);
    ctx.lineWidth=1;ctx.setLineDash([]);ctx.strokeRect(cvs.width*.20,yTop,cvs.width*.78,h);
    ctx.font='9px JetBrains Mono,monospace';
    ctx.fillStyle=ob.type==='bull'?'rgba(100,160,255,.8)':'rgba(255,120,120,.8)';
    ctx.fillText(ob.type==='bull'?'OB▲':'OB▼',cvs.width*.21,yTop-2);
  }
  if (showFVG) for (const fvg of fvgData) {
    const yTop=candleSeries.priceToCoordinate(fvg.top); const yBot=candleSeries.priceToCoordinate(fvg.bottom);
    if (yTop==null||yBot==null) continue;
    const h=Math.max(2,yBot-yTop);
    ctx.fillStyle  =fvg.type==='bull'?'rgba(100,220,160,.12)':'rgba(220,100,100,.12)';
    ctx.strokeStyle=fvg.type==='bull'?'rgba(100,220,160,.40)':'rgba(220,100,100,.40)';
    ctx.fillRect(cvs.width*.20,yTop,cvs.width*.78,h);
    ctx.lineWidth=1;ctx.setLineDash([2,3]);ctx.strokeRect(cvs.width*.20,yTop,cvs.width*.78,h);
    ctx.setLineDash([]);
    ctx.font='9px JetBrains Mono,monospace';
    ctx.fillStyle=fvg.type==='bull'?'rgba(100,220,160,.8)':'rgba(220,100,100,.8)';
    ctx.fillText(fvg.type==='bull'?'FVG▲':'FVG▼',cvs.width*.21,yTop-2);
  }
  ctx.restore();
  drawScoreZones(calcScores());
}

// ═══════════════════════════════════════════════════════════
//  OVERLAY
// ═══════════════════════════════════════════════════════════
function showOverlay(show,msg='',isErr=false) {
  const ov=document.getElementById('overlay'); ov.classList.toggle('hidden',!show);
  if (msg) document.getElementById('ov-sub').textContent=msg;
  document.querySelector('.spinner').style.display=isErr?'none':'block';
  document.querySelector('.ov-title').style.color=isErr?'#C44040':'var(--gold-d)';
  document.querySelector('.ov-title').textContent=isErr?'ERROR':'LOADING';
}

function tick() {
  const now=new Date(); const jst=new Date(now.getTime()+(9*60+now.getTimezoneOffset())*60000);
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('clk').textContent=p(jst.getUTCHours())+':'+p(jst.getUTCMinutes())+':'+p(jst.getUTCSeconds());
  const h=now.getUTCHours();
  let sess='OFF HOURS';
  if(h>=23||h<6)sess='TOKYO';else if(h<8)sess='TK/LN';else if(h<14)sess='LONDON';else if(h<16)sess='LN/NY';else if(h<21)sess='NEW YORK';
  document.getElementById('sessBadge').textContent=sess;
}

// ═══════════════════════════════════════════════════════════
//  SCORE
// ═══════════════════════════════════════════════════════════
function toggleScorePanel() {
  const panel=document.getElementById('scorePanel'); const btn=document.getElementById('scorePanelBtn');
  panel.classList.toggle('hidden'); btn.classList.toggle('on',!panel.classList.contains('hidden'));
}
function calcScores() {
  const s=STATE[currentInst];
  if (!vpData.buckets.length||!s.allCandles.length) return [];
  const last=s.allCandles[s.allCandles.length-1];
  const priceRange=vpData.buckets.at(-1).priceTo-vpData.buckets[0].priceFrom;
  const candidates=[];
  for (const ob of obData)   candidates.push({mid:(ob.top+ob.bottom)/2,top:ob.top,bot:ob.bottom,type:ob.type,src:'OB'});
  for (const fvg of fvgData) candidates.push({mid:(fvg.top+fvg.bottom)/2,top:fvg.top,bot:fvg.bottom,type:fvg.type,src:'FVG'});
  if (vpData.poc) candidates.push({mid:vpData.poc,top:vpData.poc+5,bot:vpData.poc-5,type:'neu',src:'POC'});
  const tolerance=priceRange*0.02; const used=new Array(candidates.length).fill(false); const zones=[];
  for (let i=0;i<candidates.length;i++) {
    if (used[i]) continue;
    const cluster=[candidates[i]]; used[i]=true;
    for (let j=i+1;j<candidates.length;j++){ if(!used[j]&&Math.abs(candidates[j].mid-candidates[i].mid)<tolerance){cluster.push(candidates[j]);used[j]=true;} }
    if (cluster.length<2) continue;
    const top=Math.max(...cluster.map(c=>c.top)); const bot=Math.min(...cluster.map(c=>c.bot)); const mid=(top+bot)/2;
    let score=0; const tags=[]; let bc=0,bearC=0;
    for (const c of cluster){ if(c.src==='OB'){score+=3;tags.push('OB');}if(c.src==='FVG'){score+=2;tags.push('FVG');}if(c.src==='POC'){score+=3;tags.push('POC');}if(c.type==='bull')bc++;if(c.type==='bear')bearC++; }
    if (Math.abs(mid-last.close)/priceRange<0.05) score+=2;
    const bias=bc>bearC?'bull':bearC>bc?'bear':'neu';
    zones.push({top,bot,mid,score:Math.min(score,10),maxScore:10,bias,tags:[...new Set(tags)]});
  }
  return zones.sort((a,b)=>b.score-a.score).slice(0,5);
}
function renderScores() {
  const zones=calcScores(); const panel=document.getElementById('scorePanel');
  Array.from(panel.querySelectorAll('.score-card')).forEach(el=>el.remove());
  const btn=document.getElementById('scorePanelBtn');
  if (!zones.length) return;
  zones.map(z=>{
    const pct=Math.round(z.score/z.maxScore*100);
    const cls=z.bias==='bull'?'sc-bull':z.bias==='bear'?'sc-bear':'sc-neu';
    const blbl=z.bias==='bull'?'BULL':z.bias==='bear'?'BEAR':'NEU';
    const barC=z.bias==='bull'?'#3DAA62':z.bias==='bear'?'#C44040':'#5A4E24';
    return `<div class="score-card"><div class="score-card-hdr"><span class="sc-label">${z.tags.join('+')} ${z.mid.toFixed(1)}</span><span class="sc-badge ${cls}">${blbl} ${z.score}/${z.maxScore}</span></div><div class="sc-range">${z.bot.toFixed(1)} – ${z.top.toFixed(1)}</div><div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%;background:${barC}"></div></div></div>`;
  }).reverse().forEach(h=>{ const d=document.createElement('div');d.innerHTML=h;panel.insertBefore(d.firstChild,btn); });
  drawScoreZones(zones);
}
function drawScoreZones(zones) {
  if (!candleSeries) return;
  const cvs=document.getElementById('vp-canvas'); const ctx=cvs.getContext('2d');
  const paneOY=getPaneOffset(); ctx.save(); ctx.translate(0,paneOY);
  for (const z of zones) {
    const yTop=candleSeries.priceToCoordinate(z.top); const yBot=candleSeries.priceToCoordinate(z.bot);
    if (yTop==null||yBot==null) continue;
    const h=Math.max(2,yBot-yTop); const alpha=0.04+(z.score/z.maxScore)*0.1;
    ctx.fillStyle=z.bias==='bull'?`rgba(61,170,98,${alpha})`:z.bias==='bear'?`rgba(196,64,64,${alpha})`:`rgba(201,147,42,${alpha})`;
    ctx.fillRect(cvs.width*.20,yTop,cvs.width*.78,h);
    ctx.font='bold 9px JetBrains Mono,monospace'; ctx.textAlign='right';
    ctx.fillStyle=z.bias==='bull'?'rgba(61,170,98,.7)':z.bias==='bear'?'rgba(196,64,64,.7)':'rgba(201,147,42,.7)';
    ctx.fillText('★'+z.score,cvs.width*.98,yTop+h/2+4); ctx.textAlign='left';
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  ALERT
// ═══════════════════════════════════════════════════════════
let alerts=[], lastAlertPrice=null, audioCtx=null;
function getAudioCtx(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playAlert(type) {
  try{
    const ctx=getAudioCtx(); const osc=ctx.createOscillator(); const gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value=type==='bull'?880:440; osc.type='sine';
    gain.gain.setValueAtTime(.3,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.6);
    osc.start(); osc.stop(ctx.currentTime+.6);
  }catch(e){}
}
function addAlert() {
  const price=parseFloat(document.getElementById('alertPrice').value);
  const dir=document.getElementById('alertDir').value;
  if (isNaN(price)){document.getElementById('alertHint').textContent='価格を入力';return;}
  document.getElementById('alertHint').textContent='';
  alerts.push({id:Date.now(),price,dir,fired:false,inst:currentInst});
  renderAlertList(); document.getElementById('alertPrice').value='';
}
function removeAlert(id){ alerts=alerts.filter(a=>a.id!==id); renderAlertList(); }
function renderAlertList() {
  const el=document.getElementById('alertList');
  if (!alerts.length){el.innerHTML='<span class="alert-hint">アラートなし</span>';return;}
  el.innerHTML=alerts.map(a=>`<div class="alert-tag${a.fired?' fired':''}" id="atag_${a.id}">${INSTRUMENTS[a.inst].name} ${a.price.toFixed(1)} ${a.dir==='cross'?'✕':a.dir==='above'?'↑':'↓'}<button onclick="removeAlert(${a.id})">✕</button></div>`).join('');
}
function checkAlerts(currentPrice) {
  if (lastAlertPrice===null){lastAlertPrice=currentPrice;return;}
  for (const al of alerts) {
    if (al.fired||al.inst!==currentInst) continue;
    let triggered=false;
    if (al.dir==='cross')  triggered=(lastAlertPrice<al.price&&currentPrice>=al.price)||(lastAlertPrice>al.price&&currentPrice<=al.price);
    if (al.dir==='above')  triggered=lastAlertPrice<al.price&&currentPrice>=al.price;
    if (al.dir==='below')  triggered=lastAlertPrice>al.price&&currentPrice<=al.price;
    if (triggered){
      al.fired=true; const tag=document.getElementById('atag_'+al.id); if(tag) tag.classList.add('fired');
      playAlert(currentPrice>=al.price?'bull':'bear');
      if (Notification.permission==='granted') new Notification(INSTRUMENTS[al.inst].name+' アラート',{body:al.price.toFixed(1)+' に到達'});
    }
  }
  lastAlertPrice=currentPrice;
}
function toggleAlert(){
  document.getElementById('alertPanel').classList.toggle('open');
  if (Notification.permission==='default') Notification.requestPermission();
}
renderAlertList();

async function copyChart() {
  const btn=document.getElementById('copyBtn'); btn.textContent='⏳'; btn.className='copy-btn';
  try {
    const area=document.getElementById('chartArea'); const vpCvs=document.getElementById('vp-canvas');
    const comp=document.createElement('canvas'); comp.width=area.offsetWidth; comp.height=area.offsetHeight;
    const ctx=comp.getContext('2d'); ctx.fillStyle='#060504'; ctx.fillRect(0,0,comp.width,comp.height);
    const areaRect=area.getBoundingClientRect();
    for (const c of document.getElementById('lw').querySelectorAll('canvas')) {
      const cr=c.getBoundingClientRect(); try{ctx.drawImage(c,cr.left-areaRect.left,cr.top-areaRect.top,cr.width,cr.height);}catch(e){}
    }
    ctx.drawImage(vpCvs,0,0);
    const price=document.getElementById('pMain').textContent; const tf=document.querySelector('.tf.on')?.textContent||''; const ts=new Date().toLocaleString('ja-JP');
    const cfg=INSTRUMENTS[currentInst];
    ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,0,comp.width,34);
    ctx.font='bold 14px "JetBrains Mono",monospace'; ctx.fillStyle=cfg.accentL; ctx.fillText(cfg.name,12,22);
    ctx.fillStyle='#D4C080'; ctx.fillText(price,12+ctx.measureText(cfg.name).width+12,22);
    ctx.font='10px "JetBrains Mono",monospace'; ctx.fillStyle='#5A4E24'; ctx.fillText(tf+'  '+ts,comp.width-220,22);
    comp.toBlob(async blob=>{
      try{ await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]); btn.textContent='✓ OK'; btn.className='copy-btn ok'; }
      catch(e){ const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=cfg.name+'_'+tf+'_'+Date.now()+'.png';a.click(); btn.textContent='↓ 保存'; btn.className='copy-btn ok'; }
      setTimeout(()=>{btn.textContent='📋 コピー';btn.className='copy-btn';},2500);
    },'image/png');
  }catch(e){ btn.textContent='✗'; btn.className='copy-btn err'; setTimeout(()=>{btn.textContent='📋 コピー';btn.className='copy-btn';},2500); }
}

function setTFAll(tf, btn) {
  currentTF = tf;
  // sync single-view TF buttons
  document.querySelectorAll('.tf').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll(`button.tf`).forEach(b=>{ if(b.textContent.trim().toLowerCase()===tf||b.textContent.trim()===tf) b.classList.add('on'); });
  // mark all-view TF buttons
  document.querySelectorAll('#allTfrow .tf').forEach(b=>b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  // reload all instruments
  for (const iid of ['gold','silver','btc']) {
    STATE[iid].isFirstLoad=true;
    const s=STATE[iid]; if(s.ws){try{s.ws.close();}catch(e){}} stopPolling(iid);
    loadData(iid).then(()=>connectWS(iid));
  }
}

function reloadAll() {
  for (const iid of ['gold','silver','btc']) loadData(iid).then(()=>connectWS(iid));
}

    },'image/png');
  }catch(e){ btn.textContent='✗'; btn.className='copy-btn err'; setTimeout(()=>{btn.textContent='📋 コピー';btn.className='copy-btn';},2500); }
}
