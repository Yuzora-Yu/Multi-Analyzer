<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MULTI ANALYZER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9932A;--gold-l:#E8B84B;--gold-d:#7A5510;
  --bg:#060504;--s1:#0C0A06;--s2:#0f0d08;--border:#1E1708;
  --txt:#D4C080;--txt-d:#5A4E24;--txt-dd:#2E2710;
  --up:#3DAA62;--dn:#C44040;
  --poc:#E8B84B;--vah:#5A8F6A;--val:#8F5A5A;
  --panel-w:172px;
  --hdr-h:32px;--tf-h:28px;--status-h:20px;--alert-h:26px;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace;overflow:hidden}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 150 150' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.025'/%3E%3C/svg%3E")}

.app{display:flex;flex-direction:column;height:100vh;padding:5px 7px;gap:3px}

/* ── INST TABS ── */
.inst-row{display:flex;gap:3px;flex-shrink:0}
.inst-tab{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;padding:3px 12px;
  border:1px solid var(--border);border-radius:2px;cursor:pointer;transition:.1s;color:var(--txt-d);background:none}
.inst-tab:hover{color:var(--txt)}
.inst-tab[data-id="gold"].on  {color:#060504;background:linear-gradient(110deg,#7A5510,#C9932A);border-color:#C9932A}
.inst-tab[data-id="silver"].on{color:#060504;background:linear-gradient(110deg,#404058,#9090C0);border-color:#9090C0}
.inst-tab[data-id="btc"].on   {color:#060504;background:linear-gradient(110deg,#7A4A0D,#F7931A);border-color:#F7931A}
.inst-tab[data-id="all"].on   {color:var(--gold-l);background:rgba(90,78,36,.2);border-color:var(--gold-d)}

/* ── HDR ── */
.hdr{display:flex;align-items:center;gap:8px;height:var(--hdr-h);flex-shrink:0}
.sym{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;line-height:1;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sym-gold  {background:linear-gradient(110deg,var(--gold-d),var(--gold),var(--gold-l))}
.sym-silver{background:linear-gradient(110deg,#505070,#A0A0C8,#D0D0E8)}
.sym-btc   {background:linear-gradient(110deg,#7A4A0D,#F7931A,#FFBB44)}
.sep{width:1px;height:16px;background:var(--border);flex-shrink:0}
.price-big{font-size:19px;font-weight:500;letter-spacing:1px}
.price-chg{font-size:10px;padding:1px 5px;border-radius:2px}
.up-bg{background:rgba(61,170,98,.15);color:var(--up)}.dn-bg{background:rgba(196,64,64,.15);color:var(--dn)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:7px;flex-shrink:0}
.session{font-size:8px;letter-spacing:1px;color:var(--gold-d);border:1px solid var(--border);padding:2px 6px;border-radius:2px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--up);box-shadow:0 0 6px var(--up);animation:blink 2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.clk{font-size:10px;color:var(--txt-d)}

/* ── TFROW ── */
.tfrow{display:flex;gap:3px;align-items:center;flex-shrink:0;height:var(--tf-h);flex-wrap:wrap}
.tfl{font-size:8px;color:var(--txt-d);letter-spacing:1px;margin-right:2px}
.tf,.tf-toggle,.icon-btn{background:none;border:1px solid var(--border);color:var(--txt-d);
  font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;cursor:pointer;border-radius:2px;transition:.1s}
.tf:hover,.tf-toggle:hover,.icon-btn:hover{border-color:var(--gold-d);color:var(--gold)}
.tf.on{border-color:var(--gold);color:var(--gold);background:rgba(201,147,42,.07)}
.tf-toggle.on{border-color:var(--gold);color:var(--gold);background:rgba(201,147,42,.07)}
.icon-btn.ok{border-color:var(--up);color:var(--up)}.icon-btn.err{border-color:var(--dn);color:var(--dn)}
.ml-auto{margin-left:auto}

/* ── DESKTOP LAYOUT ── */
.main-area{flex:1;min-height:0;display:flex;gap:5px}
.chart-wrap{flex:1;min-width:0;position:relative;border:1px solid var(--border);border-radius:3px;overflow:hidden}
.chart-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-d),transparent);z-index:1;pointer-events:none}
#lw{position:absolute;inset:0}
#vp-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:10}

/* ── RIGHT PANEL (desktop) ── */
.right-panel{width:var(--panel-w);flex-shrink:0;display:flex;flex-direction:column;
  border:1px solid var(--border);border-radius:3px;overflow:hidden;background:var(--s2)}
.rp-section{flex-shrink:0}
.rp-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:3px 7px;border-bottom:1px solid var(--border);background:var(--s1)}
.rp-hdr-lbl{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;color:var(--txt-d)}
.rp-hdr-cnt{font-size:8px;color:var(--txt-dd)}
.rp-body{overflow-y:auto}
.rp-body::-webkit-scrollbar,.rp-score-area::-webkit-scrollbar{width:2px}
.rp-body::-webkit-scrollbar-thumb,.rp-score-area::-webkit-scrollbar-thumb{background:var(--border)}
.rp-divider{height:1px;background:var(--border);flex-shrink:0}
.rp-score-area{flex:1;min-height:0;overflow-y:auto}

/* ── MOBILE BOTTOM SHEET ── */
.bottom-sheet{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--s2);border-top:1px solid var(--border);
  border-radius:12px 12px 0 0;
  max-height:72vh;
  transition:transform .3s ease;
  transform:translateY(calc(100% - 38px));
  flex-direction:column;
}
.bottom-sheet.open{transform:translateY(0)}
.bs-handle{display:flex;align-items:center;justify-content:center;padding:8px;cursor:pointer;flex-shrink:0;gap:12px}
.bs-handle-bar{width:36px;height:3px;background:var(--border);border-radius:2px}
.bs-handle-lbl{font-size:9px;letter-spacing:2px;color:var(--txt-d)}
.bs-content{flex:1;min-height:0;overflow-y:auto;padding-bottom:8px}
.bs-content::-webkit-scrollbar{width:2px}
.bs-content::-webkit-scrollbar-thumb{background:var(--border)}
.bs-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0}
.bs-tab{flex:1;font-size:9px;letter-spacing:1px;padding:5px;text-align:center;
  cursor:pointer;color:var(--txt-d);border:none;background:none;font-family:'JetBrains Mono',monospace}
.bs-tab.on{color:var(--gold);border-bottom:1px solid var(--gold)}
.bs-pane{display:none}.bs-pane.on{display:block}

/* ── OVERLAY ── */
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;background:rgba(6,5,4,.88);z-index:50;pointer-events:none}
.overlay.hidden{display:none}
.ov-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--gold-d)}
.ov-sub{font-size:9px;color:var(--txt-d)}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PANEL ROWS ── */
.sig-card{padding:5px 7px;border-bottom:1px solid rgba(30,23,8,.6)}
.sig-card:last-child{border-bottom:none}
.sig-card.sig-strong{background:rgba(201,147,42,.03)}
.sig-top{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.sig-arrow{font-size:12px;line-height:1}
.sig-str{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1px;padding:1px 4px;border-radius:2px}
.sig-str.strong{background:rgba(201,147,42,.18);color:var(--gold)}
.sig-str.normal{background:rgba(90,78,36,.12);color:var(--txt-d)}
.sig-heat{font-size:8px;margin-left:auto}
.sig-heat.hot{color:var(--gold);animation:blink 1.2s infinite}
.sig-heat.warm{color:var(--txt-d)}.sig-heat.cold{color:var(--txt-dd)}
.sig-price{font-size:11px;font-weight:500}
.sig-tags{font-size:8px;color:var(--txt-dd);letter-spacing:.5px;margin-top:1px}
.ob-row{display:flex;align-items:center;gap:3px;padding:3px 7px;border-bottom:1px solid rgba(30,23,8,.5)}
.ob-row:last-child{border-bottom:none}
.ob-grade{font-family:'Bebas Neue',sans-serif;font-size:11px;width:14px;text-align:center}
.ob-price{flex:1;font-size:8px;color:var(--txt-d);line-height:1.4}
.ob-meta{font-size:8px;color:var(--txt-dd);text-align:right;line-height:1.4}
.fvg-row{display:flex;align-items:center;gap:4px;padding:3px 7px;border-bottom:1px solid rgba(30,23,8,.5)}
.fvg-row:last-child{border-bottom:none}
.fvg-type{font-size:9px;width:30px}
.fvg-price{flex:1;font-size:8px;color:var(--txt-d)}
.score-card{padding:5px 7px;border-bottom:1px solid rgba(30,23,8,.5)}
.score-card:last-child{border-bottom:none}
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.sc-mid{font-size:10px;font-weight:500}
.sc-badge{font-family:'Bebas Neue',sans-serif;font-size:10px;padding:1px 5px;border-radius:2px}
.sc-bull{background:rgba(61,170,98,.18);color:#3DAA62}.sc-bear{background:rgba(196,64,64,.18);color:#C44040}.sc-neu{background:rgba(90,78,36,.3);color:var(--txt-d)}
.sc-range{font-size:8px;color:var(--txt-d);margin-top:1px}
.sc-tags{font-size:8px;color:var(--txt-dd);letter-spacing:.5px;margin-top:1px}
.sc-bar-wrap{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px}
.sc-bar{height:100%;border-radius:2px;transition:width .4s}
.empty-row{padding:5px 7px;font-size:8px;color:var(--txt-dd)}

/* ── ALERT ── */
.alert-panel{flex-shrink:0;background:var(--s1);border:1px solid var(--border);border-radius:3px;
  overflow:hidden;max-height:var(--alert-h);transition:max-height .25s ease}
.alert-panel.open{max-height:130px}
.alert-toggle{display:flex;align-items:center;gap:8px;padding:4px 10px;cursor:pointer;user-select:none}
.alert-lbl{font-size:9px;letter-spacing:2px;color:var(--gold)}
.alert-body{padding:0 10px 8px;display:flex;flex-direction:column;gap:5px}
.alert-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.alert-input{background:var(--bg);border:1px solid var(--border);color:var(--txt);
  font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 5px;border-radius:2px}
.alert-input:focus{outline:none;border-color:var(--gold-d)}
.alert-add-btn{background:none;border:1px solid var(--gold-d);color:var(--gold);
  font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 8px;cursor:pointer;border-radius:2px}
.alert-list{display:flex;flex-wrap:wrap;gap:3px}
.alert-tag{display:flex;align-items:center;gap:3px;font-family:'JetBrains Mono',monospace;
  font-size:9px;border:1px solid var(--border);border-radius:2px;padding:2px 5px;color:var(--txt-d)}
.alert-tag.fired{border-color:var(--gold);color:var(--gold)}
.alert-tag button{background:none;border:none;color:var(--txt-dd);cursor:pointer;font-size:9px}
.alert-hint{font-size:8px;color:var(--txt-d)}

/* ── STATUS BAR ── */
.statusbar{flex-shrink:0;display:flex;align-items:center;gap:10px;height:var(--status-h);
  border-top:1px solid var(--border);padding-top:2px}
.stat{font-size:8px;letter-spacing:.5px;color:var(--txt-d)}
.stat span{color:var(--txt);margin-left:2px}
#status-msg{margin-left:auto;font-size:8px;color:var(--txt-d)}

/* ── ALL GRID ── */
.all-grid{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto 1fr;gap:4px 6px}
.all-toolbar{grid-column:1/-1;display:flex;gap:3px;align-items:center}
.mini-wrap{display:flex;flex-direction:column;gap:3px;min-height:0;overflow:hidden}
.mini-hdr{flex-shrink:0;display:flex;align-items:center;gap:5px}
.mini-sym{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px}
.mini-price{font-size:11px;font-weight:500}
.mini-chg{font-size:8px;padding:1px 4px;border-radius:2px}
.mini-area{flex:1;min-height:0;position:relative;border:1px solid var(--border);border-radius:3px;overflow:hidden;cursor:pointer}
.mini-area:hover{border-color:var(--gold-d)}
.mini-area::after{content:'↗';position:absolute;top:3px;right:4px;font-size:9px;color:var(--txt-dd);pointer-events:none}

.d-none{display:none!important}

/* ═══════════════════════════════════════════════
   RESPONSIVE: モバイル ≤ 700px
════════════════════════════════════════════════ */
@media(max-width:700px){
  :root{--panel-w:0px}
  .right-panel{display:none!important}
  .bottom-sheet{display:flex}
  /* チャートが画面いっぱいに使えるよう余白を詰める */
  .app{padding:3px 4px;gap:2px}
  .inst-tab{font-size:12px;padding:3px 9px;letter-spacing:1px}
  .hdr{height:30px}
  .sym{font-size:20px}
  .price-big{font-size:17px}
  .tfrow{gap:2px}
  .tf,.tf-toggle,.icon-btn{font-size:9px;padding:2px 6px}
  /* bottom-sheetの高さ分だけmain-areaにpadding-bottom */
  .main-area{margin-bottom:38px}
}
</style>
</head>
<body>
<div class="app">

  <!-- INST TABS -->
  <div class="inst-row">
    <button class="inst-tab on" data-id="gold"   onclick="switchInst('gold',this)">GOLD</button>
    <button class="inst-tab"    data-id="silver" onclick="switchInst('silver',this)">SILVER</button>
    <button class="inst-tab"    data-id="btc"    onclick="switchInst('btc',this)">BTC</button>
    <button class="inst-tab"    data-id="all"    onclick="switchInst('all',this)">ALL</button>
  </div>

  <!-- HDR -->
  <div class="hdr" id="mainHdr">
    <div class="sym sym-gold" id="symLabel">GOLD</div>
    <div class="sep"></div>
    <div class="price-big" id="pMain" style="color:var(--gold-l)">—</div>
    <div class="price-chg" id="pChg">—</div>
    <div class="hdr-right">
      <div class="session" id="sessBadge">—</div>
      <div class="dot"></div>
      <div class="clk" id="clk">—</div>
    </div>
  </div>

  <!-- TF ROW -->
  <div class="tfrow" id="mainTfrow">
    <span class="tfl">TF</span>
    <button class="tf"    onclick="setTF('1m',this)">1m</button>
    <button class="tf on" onclick="setTF('5m',this)">5m</button>
    <button class="tf"    onclick="setTF('15m',this)">15m</button>
    <button class="tf"    onclick="setTF('1h',this)">1H</button>
    <button class="tf"    onclick="setTF('4h',this)">4H</button>
    <button class="tf"    onclick="setTF('1d',this)">1D</button>
    <button class="tf"    onclick="setTF('1wk',this)">1W</button>
    <button class="tf-toggle on" id="togOB"  onclick="toggleLayer('OB',this)">OB</button>
    <button class="tf-toggle on" id="togFVG" onclick="toggleLayer('FVG',this)">FVG</button>
    <button class="tf-toggle on" id="togSW"  onclick="toggleLayer('SW',this)">SW</button>
    <button class="tf-toggle on" id="togSIG" onclick="toggleLayer('SIG',this)">SIG</button>
    <button class="icon-btn ml-auto" onclick="reloadCurrent()">↺</button>
    <button class="icon-btn" id="copyBtn" onclick="copyChart()">📋</button>
  </div>

  <!-- MAIN AREA -->
  <div class="main-area" id="mainArea">

    <!-- CHART -->
    <div class="chart-wrap" id="chartArea">
      <div id="lw"></div>
      <canvas id="vp-canvas"></canvas>
      <div class="overlay" id="overlay">
        <div class="spinner"></div>
        <div class="ov-title">LOADING</div>
        <div class="ov-sub" id="ov-sub">データ取得中...</div>
      </div>
    </div>

    <!-- RIGHT PANEL (desktop) -->
    <div class="right-panel" id="rightPanel">
      <div class="rp-section">
        <div class="rp-hdr"><span class="rp-hdr-lbl">SIGNALS</span><span class="rp-hdr-cnt" id="rpSigCnt">—</span></div>
        <div class="rp-body" style="max-height:180px" id="rpSigBody"></div>
      </div>
      <div class="rp-divider"></div>
      <div class="rp-section">
        <div class="rp-hdr"><span class="rp-hdr-lbl">ORDER BLOCKS</span><span class="rp-hdr-cnt" id="rpObCnt">—</span></div>
        <div class="rp-body" style="max-height:200px" id="rpObBody"></div>
      </div>
      <div class="rp-divider"></div>
      <div class="rp-section">
        <div class="rp-hdr"><span class="rp-hdr-lbl">FVG</span><span class="rp-hdr-cnt" id="rpFvgCnt">—</span></div>
        <div class="rp-body" style="max-height:110px" id="rpFvgBody"></div>
      </div>
      <div class="rp-divider"></div>
      <div class="rp-hdr"><span class="rp-hdr-lbl">SCORE ZONES</span></div>
      <div class="rp-score-area" id="rpScoreBody"></div>
    </div>

  </div><!-- .main-area -->

  <!-- ALERT -->
  <div class="alert-panel" id="alertPanel">
    <div class="alert-toggle" onclick="toggleAlert()">
      <div class="alert-lbl">🔔 ALERT</div>
      <div style="margin-left:auto;font-size:8px;color:var(--txt-d)">▼</div>
    </div>
    <div class="alert-body">
      <div class="alert-row">
        <input class="alert-input" id="alertPrice" type="number" placeholder="価格" step="0.1" style="width:90px">
        <select class="alert-input" id="alertDir" style="width:72px">
          <option value="cross">クロス</option>
          <option value="above">↑上抜</option>
          <option value="below">↓下抜</option>
        </select>
        <button class="alert-add-btn" onclick="addAlert()">＋</button>
        <span class="alert-hint" id="alertHint"></span>
      </div>
      <div class="alert-list" id="alertList"></div>
    </div>
  </div>

  <!-- ALL VIEW -->
  <div class="all-grid d-none" id="allGrid">
    <div class="all-toolbar">
      <span class="tfl">TF</span>
      <button class="tf"    onclick="setTFAll('1m',this)">1m</button>
      <button class="tf on" id="allTfAct" onclick="setTFAll('5m',this)">5m</button>
      <button class="tf"    onclick="setTFAll('15m',this)">15m</button>
      <button class="tf"    onclick="setTFAll('1h',this)">1H</button>
      <button class="tf"    onclick="setTFAll('4h',this)">4H</button>
      <button class="tf"    onclick="setTFAll('1d',this)">1D</button>
      <button class="tf"    onclick="setTFAll('1wk',this)">1W</button>
      <button class="icon-btn ml-auto" onclick="reloadAll()">↺</button>
      <button class="icon-btn" id="copyBtnAll" onclick="copyAllChart()">📋</button>
    </div>
    <div class="mini-wrap">
      <div class="mini-hdr"><div class="mini-sym sym-gold">GOLD</div><div class="mini-price sym-gold" id="allPg">—</div><div class="mini-chg" id="allCg">—</div></div>
      <div class="mini-area" onclick="switchInst('gold',document.querySelector('[data-id=gold]'))"><div id="miniLwGold" style="position:absolute;inset:0"></div></div>
    </div>
    <div class="mini-wrap">
      <div class="mini-hdr"><div class="mini-sym sym-silver">SILVER</div><div class="mini-price sym-silver" id="allPs">—</div><div class="mini-chg" id="allCs">—</div></div>
      <div class="mini-area" onclick="switchInst('silver',document.querySelector('[data-id=silver]'))"><div id="miniLwSilver" style="position:absolute;inset:0"></div></div>
    </div>
    <div class="mini-wrap">
      <div class="mini-hdr"><div class="mini-sym sym-btc">BTC</div><div class="mini-price sym-btc" id="allPb">—</div><div class="mini-chg" id="allCb">—</div></div>
      <div class="mini-area" onclick="switchInst('btc',document.querySelector('[data-id=btc]'))"><div id="miniLwBtc" style="position:absolute;inset:0"></div></div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="statusbar">
    <div class="stat">HIGH<span id="stHigh">—</span></div>
    <div class="sep" style="height:10px"></div>
    <div class="stat">LOW<span id="stLow">—</span></div>
    <div class="sep" style="height:10px"></div>
    <div class="stat">POC<span id="stPOC">—</span></div>
    <div class="sep" style="height:10px"></div>
    <div class="stat">VAH<span id="stVAH">—</span></div>
    <div class="sep" style="height:10px"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const INST={
  gold:  {sym:'XAUUSDT',name:'GOLD',  wsStream:'xauusdt',ep:'fapi',dp:2,accentL:'var(--gold-l)',symCls:'sym-gold',  allP:'allPg',allC:'allCg',miniLw:'miniLwGold'  },
  silver:{sym:'XAGUSDT',name:'SILVER',wsStream:'xagusdt',ep:'fapi',dp:4,accentL:'#C0C0D8',     symCls:'sym-silver',allP:'allPs',allC:'allCs',miniLw:'miniLwSilver'},
  btc:   {sym:'BTCUSDT',name:'BTC',   wsStream:'btcusdt',ep:'spot',dp:2,accentL:'#F7931A',     symCls:'sym-btc',   allP:'allPb',allC:'allCb',miniLw:'miniLwBtc'   },
};
const BN_INT ={'1m':'1m','5m':'5m','15m':'15m','1h':'1h','4h':'4h','1d':'1d','1wk':'1w'};
const BN_LIM ={'1m':1000,'5m':1000,'15m':1000,'1h':1000,'4h':500,'1d':730,'1wk':300};
const SHOW_B ={'1m':150,'5m':120,'15m':120,'1h':80,'4h':60,'1d':90,'1wk':60};
const OB_AGE ={S:Infinity,A:Infinity,B:150,C:60};
const VP_N=60;

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const S={};
for(const id of ['gold','silver','btc'])
  S[id]={candles:[],vp:{buckets:[],poc:null,vah:null,val:null},obs:{active:[],flip:[]},fvgs:[],swings:[],
         ws:null,wsTimer:null,wsFailCount:0,pollTimer:null,isFirstLoad:true,
         miniChart:null,miniSeries:null};
let chart=null,cSeries=null,volSeries=null;
let currentInst='gold',currentTF='5m';
let showOB=true,showFVG=true,showSW=true,showSIG=true;
let vpData={buckets:[],poc:null,vah:null,val:null};
let obData={active:[],flip:[]},fvgData=[],swData=[];

// ═══════════════════════════════════════════════════════════
//  FETCH
// ═══════════════════════════════════════════════════════════
async function fetchCandles(instId,tf){
  const cfg=INST[instId],bnInt=BN_INT[tf]||'5m',lim=BN_LIM[tf]||500,sym=cfg.sym;
  const urls=cfg.ep==='fapi'?[
    `https://fapi.binance.com/fapi/v1/klines?symbol=${sym}&interval=${bnInt}&limit=${lim}`,
    `http://localhost:8001/klines?symbol=${sym}&interval=${bnInt}&limit=${lim}`,
  ]:[
    `https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${bnInt}&limit=${lim}`,
    `http://localhost:8001/klines?symbol=${sym}&interval=${bnInt}&limit=${lim}`,
  ];
  for(const url of urls){
    try{const r=await fetch(url);if(!r.ok)continue;
      const d=await r.json();if(!Array.isArray(d)||!d.length)continue;
      return d.map(x=>({time:Math.floor(x[0]/1000),open:+x[1],high:+x[2],low:+x[3],close:+x[4],volume:+x[5]}));}
    catch(e){}
  }
  throw new Error('fetch failed');
}

// ═══════════════════════════════════════════════════════════
//  WEBSOCKET
// ═══════════════════════════════════════════════════════════
function connectWS(instId){
  const s=S[instId],cfg=INST[instId];
  if(s.ws){try{s.ws.close();}catch(e){}s.ws=null;}
  clearTimeout(s.wsTimer);
  if(s.wsFailCount>=5){startPoll(instId);return;}
  const bnInt=BN_INT[currentTF]||'5m';
  const url=cfg.ep==='fapi'
    ?`wss://fstream.binance.com/ws/${cfg.wsStream}@kline_${bnInt}`
    :`wss://stream.binance.com:9443/ws/${cfg.wsStream}@kline_${bnInt}`;
  const ws=new WebSocket(url);s.ws=ws;let opened=false;
  ws.onopen =()=>{opened=true;s.wsFailCount=0;stopPoll(instId);setStatus(instId,'⚡ RT');};
  ws.onerror=()=>{};
  ws.onclose=()=>{
    if(!opened)s.wsFailCount++;
    const d=opened?5000:Math.min(3000*Math.pow(2,s.wsFailCount),30000);
    if(s.wsFailCount<5){setStatus(instId,`⚠ ${Math.round(d/1000)}s後`);s.wsTimer=setTimeout(()=>connectWS(instId),d);}
    else startPoll(instId);
  };
  ws.onmessage=e=>{
    try{const k=JSON.parse(e.data).k;if(!k)return;
      onTick(instId,{time:Math.floor(k.t/1000),open:+k.o,high:+k.h,low:+k.l,close:+k.c,volume:+k.v});}
    catch(ex){}
  };
}
function startPoll(instId){
  const s=S[instId];if(s.pollTimer)return;
  setStatus(instId,'↺ polling');
  s.pollTimer=setInterval(async()=>{
    try{const c=await fetchCandles(instId,currentTF);if(c.length){s.candles=c;onTick(instId,c[c.length-1]);}}catch(e){}
  },15000);
}
function stopPoll(instId){const s=S[instId];if(s.pollTimer){clearInterval(s.pollTimer);s.pollTimer=null;}}
function setStatus(instId,msg){if(instId===currentInst)document.getElementById('status-msg').textContent=msg;}

function onTick(instId,c){
  const s=S[instId],cfg=INST[instId];
  if(s.candles.length){
    const last=s.candles[s.candles.length-1];
    if(last.time===c.time)s.candles[s.candles.length-1]=c;
    else if(c.time>last.time)s.candles.push(c);
  }
  if(instId===currentInst&&cSeries){
    try{cSeries.update({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close});}catch(e){}
    try{volSeries.update({time:c.time,value:c.volume,color:c.close>=c.open?'rgba(61,170,98,.3)':'rgba(196,64,64,.3)'});}catch(e){}
    const prev=s.candles[s.candles.length-2]||c;
    const da=c.close-prev.close,dp=(da/prev.close*100).toFixed(2);
    document.getElementById('pMain').textContent=c.close.toFixed(cfg.dp);
    const el=document.getElementById('pChg');el.textContent=(da>=0?'+':'')+da.toFixed(cfg.dp)+' ('+dp+'%)';el.className='price-chg '+(da>=0?'up-bg':'dn-bg');
    checkAlerts(c.close);
  }
  if(s.miniSeries){try{s.miniSeries.update({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close});}catch(e){}}
  const prev2=s.candles[s.candles.length-2]||c,da2=c.close-prev2.close;
  const ep=document.getElementById(cfg.allP);if(ep)ep.textContent=c.close.toFixed(cfg.dp);
  const ec=document.getElementById(cfg.allC);if(ec){ec.textContent=(da2>=0?'+':'')+da2.toFixed(cfg.dp);ec.className='mini-chg '+(da2>=0?'up-bg':'dn-bg');}
  if(!onTick._n)onTick._n={};
  onTick._n[instId]=(onTick._n[instId]||0)+1;
  if(instId===currentInst&&onTick._n[instId]%30===0)recalcAll(instId);
}

// ═══════════════════════════════════════════════════════════
//  CALC
// ═══════════════════════════════════════════════════════════
function calcVP(candles){
  if(!candles.length)return{buckets:[],poc:null,vah:null,val:null};
  const hi=Math.max(...candles.map(c=>c.high)),lo=Math.min(...candles.map(c=>c.low));
  const step=(hi-lo)/VP_N;if(step<=0)return{buckets:[],poc:null,vah:null,val:null};
  const vols=new Float64Array(VP_N);
  for(const c of candles){
    const b0=Math.max(0,Math.floor((c.low-lo)/step)),b1=Math.min(VP_N-1,Math.floor((c.high-lo)/step));
    const vpp=c.volume/(b1-b0+1);for(let i=b0;i<=b1;i++)vols[i]+=vpp;
  }
  const maxV=Math.max(...vols),totV=vols.reduce((a,b)=>a+b,0),pocI=Array.from(vols).indexOf(maxV);
  let vaV=vols[pocI],va0=pocI,va1=pocI;
  while(vaV<totV*.70&&(va0>0||va1<VP_N-1)){
    const up=va1<VP_N-1?vols[va1+1]:0,dn=va0>0?vols[va0-1]:0;
    if(up>=dn){va1++;vaV+=vols[va1];}else{va0--;vaV+=vols[va0];}
  }
  return{buckets:Array.from(vols).map((v,i)=>({priceFrom:lo+i*step,priceTo:lo+(i+1)*step,priceMid:lo+(i+.5)*step,
    volume:v,ratio:maxV>0?v/maxV:0,isPOC:i===pocI,inVA:i>=va0&&i<=va1})),
    poc:lo+(pocI+.5)*step,vah:lo+(va1+1)*step,val:lo+va0*step};
}

function calcOB(candles){
  const obs=[],sw=3,n=candles.length;
  const fvgSet=new Set();
  for(let i=1;i<n-1;i++){if(candles[i+1].low>candles[i-1].high||candles[i+1].high<candles[i-1].low)fvgSet.add(i);}
  for(let i=sw;i<n-sw;i++){
    const c=candles[i];
    if(c.close<c.open){
      let imp=0,iCnt=0;
      for(let j=i+1;j<=i+sw;j++){const d=candles[j].close-candles[j].open;if(d>0){imp+=d;iCnt++;}}
      const body=c.open-c.close;
      if(imp>body*1.5){
        const iR=imp/body,bR=body/Math.max(c.high-c.low,.0001);
        let touches=0,mitigated=false;
        for(let j=i+1;j<n;j++){if(candles[j].high>=c.low&&candles[j].low<=c.open)touches++;if(candles[j].low<c.low){mitigated=true;break;}}
        let sc=0;sc+=iR>4?3:iR>2.5?2:1;sc+=bR>0.65?2:bR>0.4?1:0;sc+=iCnt>=2?2:1;sc+=touches===0?3:touches===1?1:0;sc+=fvgSet.has(i)||fvgSet.has(i+1)?2:0;
        const grade=sc>=10?'S':sc>=7?'A':sc>=4?'B':'C';
        obs.push({type:'bull',top:c.open,bottom:c.low,idx:i,sc,grade,touches,mitigated,volume:c.volume,age:n-1-i});
      }
    }
    if(c.close>c.open){
      let imp=0,iCnt=0;
      for(let j=i+1;j<=i+sw;j++){const d=candles[j].open-candles[j].close;if(d>0){imp+=d;iCnt++;}}
      const body=c.close-c.open;
      if(imp>body*1.5){
        const iR=imp/body,bR=body/Math.max(c.high-c.low,.0001);
        let touches=0,mitigated=false;
        for(let j=i+1;j<n;j++){if(candles[j].low<=c.high&&candles[j].high>=c.open)touches++;if(candles[j].high>c.high){mitigated=true;break;}}
        let sc=0;sc+=iR>4?3:iR>2.5?2:1;sc+=bR>0.65?2:bR>0.4?1:0;sc+=iCnt>=2?2:1;sc+=touches===0?3:touches===1?1:0;sc+=fvgSet.has(i)||fvgSet.has(i+1)?2:0;
        const grade=sc>=10?'S':sc>=7?'A':sc>=4?'B':'C';
        obs.push({type:'bear',top:c.high,bottom:c.open,idx:i,sc,grade,touches,mitigated,volume:c.volume,age:n-1-i});
      }
    }
  }
  return{active:obs.filter(o=>!o.mitigated&&o.age<=OB_AGE[o.grade]),flip:obs.filter(o=>o.mitigated&&(o.grade==='S'||o.grade==='A'))};
}

function calcFVG(candles){
  const fvgs=[],n=candles.length;
  for(let i=1;i<n-1;i++){
    const p=candles[i-1],nx=candles[i+1];
    if(nx.low>p.high){const f={type:'bull',top:nx.low,bottom:p.high,mitigated:false,age:n-1-i};for(let j=i+1;j<n;j++){if(candles[j].low<=f.bottom){f.mitigated=true;break;}}fvgs.push(f);}
    if(nx.high<p.low){const f={type:'bear',top:p.low,bottom:nx.high,mitigated:false,age:n-1-i};for(let j=i+1;j<n;j++){if(candles[j].high>=f.top){f.mitigated=true;break;}}fvgs.push(f);}
  }
  return fvgs.filter(f=>!f.mitigated).slice(-16);
}

function calcSwings(candles){
  const sws=[],n=candles.length,lb=5;
  for(let i=lb;i<n-lb;i++){
    const c=candles[i];let isH=true,isL=true;
    for(let j=i-lb;j<=i+lb;j++){if(j===i)continue;if(candles[j].high>=c.high)isH=false;if(candles[j].low<=c.low)isL=false;}
    if(isH)sws.push({type:'high',price:c.high,time:c.time,idx:i});
    if(isL)sws.push({type:'low', price:c.low, time:c.time,idx:i});
  }
  return sws.slice(-30);
}

function recalcAll(instId){
  const s=S[instId];
  s.vp=calcVP(s.candles);s.obs=calcOB(s.candles);s.fvgs=calcFVG(s.candles);s.swings=calcSwings(s.candles);
  if(instId===currentInst){vpData=s.vp;obData=s.obs;fvgData=s.fvgs;swData=s.swings;}
}

// ═══════════════════════════════════════════════════════════
//  SCORE & SIGNALS
// ═══════════════════════════════════════════════════════════
function calcScores(){
  const s=S[currentInst];if(!s.candles.length||!vpData.buckets.length)return[];
  const last=s.candles[s.candles.length-1],cur=last.close;
  const priceRange=vpData.buckets.at(-1).priceTo-vpData.buckets[0].priceFrom;
  const tol=priceRange*.025;
  const cands=[];
  for(const ob of(obData.active||[])){const mid=(ob.top+ob.bottom)/2;const pts=ob.grade==='S'?5:ob.grade==='A'?4:ob.grade==='B'?3:1;cands.push({mid,top:ob.top,bot:ob.bottom,type:ob.type,src:'OB',pts,grade:ob.grade});}
  for(const fvg of fvgData)cands.push({mid:(fvg.top+fvg.bottom)/2,top:fvg.top,bot:fvg.bottom,type:fvg.type,src:'FVG',pts:2});
  if(vpData.poc!=null)cands.push({mid:vpData.poc,top:vpData.poc+1,bot:vpData.poc-1,type:'neu',src:'POC',pts:3});
  const used=new Array(cands.length).fill(false),zones=[];
  for(let i=0;i<cands.length;i++){
    if(used[i])continue;
    const cl=[cands[i]];used[i]=true;
    for(let j=i+1;j<cands.length;j++){if(!used[j]&&Math.abs(cands[j].mid-cands[i].mid)<tol){cl.push(cands[j]);used[j]=true;}}
    if(cl.length<2)continue;
    const top=Math.max(...cl.map(c=>c.top)),bot=Math.min(...cl.map(c=>c.bot)),mid=(top+bot)/2;
    let sc=0;const tags=new Set();let bc=0,bearC=0;
    for(const c of cl){sc+=c.pts;tags.add(c.src);if(c.type==='bull')bc++;else if(c.type==='bear')bearC++;}
    for(const sw of(swData||[])){if(Math.abs(sw.price-mid)<tol*2){sc+=2;tags.add('SW');break;}}
    if(Math.abs(mid-cur)/priceRange<.04)sc+=2;
    const bias=bc>bearC?'bull':bearC>bc?'bear':'neu';
    zones.push({top,bot,mid,score:Math.min(sc,12),maxScore:12,bias,tags:[...tags]});
  }
  return zones.sort((a,b)=>b.score-a.score).slice(0,6);
}

function calcEntrySignals(){
  const s=S[currentInst];if(!s.candles.length||!vpData.buckets.length)return[];
  const last=s.candles[s.candles.length-1],cur=last.close;
  const priceRange=vpData.buckets.at(-1).priceTo-vpData.buckets[0].priceFrom;
  const tol=priceRange*.025;
  const zones=calcScores(),signals=[];
  for(const z of zones){
    if(z.bias==='neu'||!z.tags.includes('OB'))continue;
    // 対象ゾーンに最も近いOBを特定（形成時刻取得用）
    const nearObs=(obData.active||[]).filter(ob=>Math.abs((ob.top+ob.bottom)/2-z.mid)<tol);
    const hasHighOB=nearObs.some(ob=>ob.grade==='S'||ob.grade==='A');
    const hasBOB=nearObs.some(ob=>ob.grade==='B');
    const isStrong=z.score>=8&&hasHighOB&&z.tags.includes('FVG')&&(z.tags.includes('POC')||z.tags.includes('SW'));
    const isNormal=z.score>=5&&(hasHighOB||hasBOB);
    if(!isStrong&&!isNormal)continue;
    const inZone=cur>=z.bot&&cur<=z.top;
    const distRatio=inZone?0:z.bias==='bull'?Math.abs(cur-z.top)/priceRange:Math.abs(cur-z.bot)/priceRange;
    const heat=distRatio<.005?'HOT':distRatio<.020?'WARM':'COLD';
    const entryPrice=z.bias==='bull'?z.top:z.bot;
    // 最もスコアの高いOBの形成時刻（candle time）を使用
    const bestOb=nearObs.sort((a,b)=>b.sc-a.sc)[0];
    const formationTime=bestOb?s.candles[bestOb.idx]?.time??last.time:last.time;
    signals.push({type:z.bias,strength:isStrong?'STRONG':'NORMAL',entryPrice,
      zoneTop:z.top,zoneBot:z.bot,zoneMid:z.mid,
      score:z.score,maxScore:z.maxScore,tags:z.tags,heat,distRatio,formationTime});
  }
  const out=[];
  for(const sig of signals.sort((a,b)=>b.score-a.score)){
    let dup=false;
    for(const s2 of out){if(s2.type===sig.type&&Math.abs(s2.entryPrice-sig.entryPrice)/priceRange<.015){dup=true;break;}}
    if(!dup)out.push(sig);
  }
  return out;
}

// ═══════════════════════════════════════════════════════════
//  CHART INIT

function initChart(){
  const el=document.getElementById('lw');
  if(chart){chart.remove();chart=null;cSeries=null;volSeries=null;}
  chart=LightweightCharts.createChart(el,{
    width:el.offsetWidth,height:el.offsetHeight,
    layout:{background:{type:'solid',color:'#060504'},textColor:'#5A4E24',fontFamily:"'JetBrains Mono',monospace",fontSize:10},
    grid:{vertLines:{color:'#0A0805'},horzLines:{color:'#0A0805'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal,vertLine:{color:'#3D2A08',labelBackgroundColor:'#130F07'},horzLine:{color:'#3D2A08',labelBackgroundColor:'#130F07'}},
    rightPriceScale:{borderColor:'#1E1708',textColor:'#5A4E24',scaleMargins:{top:.08,bottom:.22}},
    timeScale:{borderColor:'#1E1708',timeVisible:true,secondsVisible:false},
  });
  cSeries=chart.addCandlestickSeries({upColor:'#3DAA62',downColor:'#C44040',borderUpColor:'#3DAA62',borderDownColor:'#C44040',wickUpColor:'#3DAA62',wickDownColor:'#C44040'});
  volSeries=chart.addHistogramSeries({color:'#1E1708',priceFormat:{type:'volume'},priceScaleId:'vol'});
  chart.priceScale('vol').applyOptions({scaleMargins:{top:.82,bottom:0}});
  chart.timeScale().subscribeVisibleLogicalRangeChange(()=>requestAnimationFrame(draw));
  setInterval(()=>{requestAnimationFrame(draw);renderPanel();},130);
  new ResizeObserver(()=>{
    const a=document.getElementById('chartArea');
    chart.applyOptions({width:a.offsetWidth,height:a.offsetHeight});
    resizeCvs();requestAnimationFrame(draw);
  }).observe(document.getElementById('chartArea'));
}
function initMiniChart(instId){
  const s=S[instId],cfg=INST[instId];if(s.miniChart)return;
  const el=document.getElementById(cfg.miniLw);if(!el)return;
  s.miniChart=LightweightCharts.createChart(el,{width:el.offsetWidth||300,height:el.offsetHeight||200,
    layout:{background:{type:'solid',color:'#060504'},textColor:'#5A4E24'},grid:{vertLines:{color:'#0A0805'},horzLines:{color:'#0A0805'}},
    rightPriceScale:{borderColor:'#1E1708'},timeScale:{borderColor:'#1E1708',timeVisible:true,secondsVisible:false},
    handleScroll:false,handleScale:false});
  s.miniSeries=s.miniChart.addCandlestickSeries({upColor:'#3DAA62',downColor:'#C44040',borderUpColor:'#3DAA62',borderDownColor:'#C44040',wickUpColor:'#3DAA62',wickDownColor:'#C44040'});
  if(s.candles.length){s.miniSeries.setData(s.candles.map(c=>({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close})));s.miniChart.timeScale().fitContent();}
  let rto=null;
  new ResizeObserver(()=>{clearTimeout(rto);rto=setTimeout(()=>{if(s.miniChart&&el.offsetWidth>0)s.miniChart.applyOptions({width:el.offsetWidth,height:el.offsetHeight});},60);}).observe(el.parentElement);
}

// ═══════════════════════════════════════════════════════════
//  PRICE SCALE RESET (BUG FIX: zoom/pan → tab switch)
// ═══════════════════════════════════════════════════════════
function resetChartView(candles){
  // 1. Force autoScale on right price scale to clear any manual range
  chart.priceScale('right').applyOptions({autoScale:true});
  // 2. Fit all data first
  chart.timeScale().fitContent();
  // 3. Then set our preferred visible bar range
  const show=SHOW_B[currentTF]||80;
  chart.timeScale().setVisibleLogicalRange({from:Math.max(0,candles.length-show-2),to:candles.length+2});
}

// ═══════════════════════════════════════════════════════════
//  LOAD DATA
// ═══════════════════════════════════════════════════════════
async function loadData(instId){
  instId=instId||currentInst;
  const s=S[instId],cfg=INST[instId];
  if(instId===currentInst)showOverlay(true,'データ取得中...');
  try{
    const candles=await fetchCandles(instId,currentTF);
    s.candles=candles;s.vp=calcVP(candles);s.obs=calcOB(candles);s.fvgs=calcFVG(candles);s.swings=calcSwings(candles);
    if(instId===currentInst&&cSeries){
      vpData=s.vp;obData=s.obs;fvgData=s.fvgs;swData=s.swings;
      cSeries.setData(candles.map(c=>({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close})));
      volSeries.setData(candles.map(c=>({time:c.time,value:c.volume,color:c.close>=c.open?'rgba(61,170,98,.3)':'rgba(196,64,64,.3)'})));
      resetChartView(candles);
      s.isFirstLoad=false;
      const last=candles[candles.length-1],prev=candles[candles.length-2]||last;
      const da=last.close-prev.close,dp=(da/prev.close*100).toFixed(2);
      document.getElementById('pMain').textContent=last.close.toFixed(cfg.dp);
      const chgEl=document.getElementById('pChg');chgEl.textContent=(da>=0?'+':'')+da.toFixed(cfg.dp)+' ('+dp+'%)';chgEl.className='price-chg '+(da>=0?'up-bg':'dn-bg');
      document.getElementById('stHigh').textContent=' '+Math.max(...candles.map(c=>c.high)).toFixed(cfg.dp);
      document.getElementById('stLow').textContent =' '+Math.min(...candles.map(c=>c.low)).toFixed(cfg.dp);
      document.getElementById('stPOC').textContent =' '+(s.vp.poc?.toFixed(cfg.dp)??'—');
      document.getElementById('stVAH').textContent =' '+(s.vp.vah?.toFixed(cfg.dp)??'—');
      document.getElementById('stVAL').textContent =' '+(s.vp.val?.toFixed(cfg.dp)??'—');
      checkAlerts(last.close);showOverlay(false);requestAnimationFrame(draw);
      setStatus(instId,candles.length+'本 | OB:'+(s.obs.active.length));
    }
    if(s.miniSeries){s.miniSeries.setData(candles.map(c=>({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close})));s.miniChart?.timeScale().fitContent();}
    const last2=candles[candles.length-1],prev2=candles[candles.length-2]||last2,da2=last2.close-prev2.close;
    const ep=document.getElementById(cfg.allP);if(ep)ep.textContent=last2.close.toFixed(cfg.dp);
    const ec=document.getElementById(cfg.allC);if(ec){ec.textContent=(da2>=0?'+':'')+da2.toFixed(cfg.dp);ec.className='mini-chg '+(da2>=0?'up-bg':'dn-bg');}
  }catch(e){if(instId===currentInst)showOverlay(true,'取得失敗: '+e.message,true);}
}

function switchInst(id,btn){
  document.querySelectorAll('.inst-tab').forEach(t=>t.classList.remove('on'));
  if(btn)btn.classList.add('on');
  if(id==='all'){
    document.getElementById('mainHdr').classList.add('d-none');
    document.getElementById('mainTfrow').classList.add('d-none');
    document.getElementById('mainArea').classList.add('d-none');
    document.getElementById('alertPanel').classList.add('d-none');
    document.getElementById('allGrid').classList.remove('d-none');
    for(const iid of ['gold','silver','btc'])setTimeout(()=>initMiniChart(iid),60);
    return;
  }
  document.getElementById('mainHdr').classList.remove('d-none');
  document.getElementById('mainTfrow').classList.remove('d-none');
  document.getElementById('mainArea').classList.remove('d-none');
  document.getElementById('alertPanel').classList.remove('d-none');
  document.getElementById('allGrid').classList.add('d-none');
  const prev=currentInst;currentInst=id;
  const cfg=INST[id];
  const symEl=document.getElementById('symLabel');symEl.textContent=cfg.name;symEl.className='sym '+cfg.symCls;
  document.getElementById('pMain').style.color=cfg.accentL;
  document.getElementById('vp-canvas').getContext('2d').clearRect(0,0,9999,9999);
  const s=S[id];
  if(s.candles.length&&!s.isFirstLoad){
    vpData=s.vp;obData=s.obs;fvgData=s.fvgs;swData=s.swings;
    cSeries.setData(s.candles.map(c=>({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close})));
    volSeries.setData(s.candles.map(c=>({time:c.time,value:c.volume,color:c.close>=c.open?'rgba(61,170,98,.3)':'rgba(196,64,64,.3)'})));
    // ★ BUG FIX: force autoScale then reset view to new instrument's range
    resetChartView(s.candles);
    const last=s.candles[s.candles.length-1],p2=s.candles[s.candles.length-2]||last,da=last.close-p2.close;
    document.getElementById('pMain').textContent=last.close.toFixed(cfg.dp);
    const el=document.getElementById('pChg');el.textContent=(da>=0?'+':'')+da.toFixed(cfg.dp)+' ('+(da/p2.close*100).toFixed(2)+'%)';el.className='price-chg '+(da>=0?'up-bg':'dn-bg');
    document.getElementById('stHigh').textContent=' '+Math.max(...s.candles.map(c=>c.high)).toFixed(cfg.dp);
    document.getElementById('stLow').textContent =' '+Math.min(...s.candles.map(c=>c.low)).toFixed(cfg.dp);
    document.getElementById('stPOC').textContent =' '+(s.vp.poc?.toFixed(cfg.dp)??'—');
    document.getElementById('stVAH').textContent =' '+(s.vp.vah?.toFixed(cfg.dp)??'—');
    document.getElementById('stVAL').textContent =' '+(s.vp.val?.toFixed(cfg.dp)??'—');
    requestAnimationFrame(draw);
  }else{
    vpData={buckets:[],poc:null,vah:null,val:null};obData={active:[],flip:[]};fvgData=[];swData=[];
    document.getElementById('pMain').textContent='—';document.getElementById('pChg').textContent='—';
    loadData(id).then(()=>connectWS(id));return;
  }
  if(id!==prev)connectWS(id);
}

function reloadAll(){for(const iid of ['gold','silver','btc']){const s=S[iid];if(s.ws){try{s.ws.close();}catch(e){}}stopPoll(iid);s.isFirstLoad=true;loadData(iid).then(()=>connectWS(iid));}}
function toggleLayer(l,btn){
  if(l==='OB')showOB=!showOB;else if(l==='FVG')showFVG=!showFVG;else if(l==='SW')showSW=!showSW;else showSIG=!showSIG;
  btn.classList.toggle('on',l==='OB'?showOB:l==='FVG'?showFVG:l==='SW'?showSW:showSIG);
  requestAnimationFrame(draw);
}

// ═══════════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════════
function resizeCvs(){const a=document.getElementById('chartArea'),cvs=document.getElementById('vp-canvas');cvs.width=a.offsetWidth;cvs.height=a.offsetHeight;}
function getPaneOY(){
  const cvs=document.querySelectorAll('#lw canvas');if(!cvs.length)return 0;
  return Math.round(cvs[0].getBoundingClientRect().top-document.getElementById('chartArea').getBoundingClientRect().top);
}
function p2y(price){return cSeries?cSeries.priceToCoordinate(price):null;}

let _phase=0;
function draw(){
  const cvs=document.getElementById('vp-canvas'),ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,cvs.width,cvs.height);
  if(!cSeries)return;
  _phase=(_phase+.04)%(Math.PI*2);
  const pOY=getPaneOY();ctx.save();ctx.translate(0,pOY);
  const W=cvs.width;

  // ── VP ──
  if(vpData.buckets.length){
    const maxW=W*.16;
    for(const b of vpData.buckets){
      const y0=p2y(b.priceTo),y1=p2y(b.priceFrom);if(y0==null||y1==null)continue;
      ctx.fillStyle=b.isPOC?'rgba(232,184,75,.55)':b.inVA?'rgba(80,120,80,.20)':'rgba(60,50,20,.25)';
      ctx.fillRect(0,y0,b.ratio*maxW,Math.max(1,y1-y0));
    }
    for(const[v,c,d]of[[vpData.poc,'rgba(232,184,75,.80)',[4,4]],[vpData.vah,'rgba(90,143,106,.60)',[3,6]],[vpData.val,'rgba(143,90,90,.60)',[3,6]]]){
      if(v==null)continue;const y=p2y(v);if(y==null)continue;
      ctx.strokeStyle=c;ctx.lineWidth=1;ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W*.80,y);ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // ── FLIP ZONES（S/A緩和済み・帯のみ） ──
  if(showOB&&obData.flip){
    for(const ob of obData.flip){
      const yt=p2y(ob.top),yb=p2y(ob.bottom);if(yt==null||yb==null)continue;
      const h=Math.max(1,yb-yt);
      const[r,g,b]=ob.type==='bull'?[100,160,255]:[255,100,100];
      ctx.fillStyle=`rgba(${r},${g},${b},.03)`;ctx.strokeStyle=`rgba(${r},${g},${b},.15)`;
      ctx.lineWidth=.7;ctx.setLineDash([3,7]);
      ctx.fillRect(W*.18,yt,W*.76,h);ctx.strokeRect(W*.18,yt,W*.76,h);ctx.setLineDash([]);
    }
  }

  // ── ACTIVE OBs: S/Aのみチャート描画、B/Cは描画しない ──
  if(showOB&&obData.active){
    const GRADE={S:{fill:.16,stroke:.90,lw:2,dash:[]},A:{fill:.11,stroke:.72,lw:1.5,dash:[]}};
    for(const ob of obData.active){
      if(ob.grade!=='S'&&ob.grade!=='A')continue; // B/C はチャート上非表示
      const yt=p2y(ob.top),yb=p2y(ob.bottom);if(yt==null||yb==null)continue;
      const h=Math.max(2,yb-yt),st=GRADE[ob.grade];
      const[r,g,b]=ob.type==='bull'?[100,160,255]:[255,100,100];
      ctx.fillStyle  =`rgba(${r},${g},${b},${st.fill})`;
      ctx.strokeStyle=`rgba(${r},${g},${b},${st.stroke})`;
      ctx.lineWidth=st.lw;ctx.setLineDash(st.dash);
      ctx.fillRect(W*.18,yt,W*.76,h);ctx.strokeRect(W*.18,yt,W*.76,h);ctx.setLineDash([]);
      // グレード色帯（左端4px）
      const ga=ob.grade==='S'?1.0:.80;
      ctx.fillStyle=`rgba(${r},${g},${b},${ga})`;ctx.fillRect(W*.18,yt,4,h);
    }
  }

  // ── FVG（帯のみ） ──
  if(showFVG&&fvgData){
    for(const fvg of fvgData){
      const yt=p2y(fvg.top),yb=p2y(fvg.bottom);if(yt==null||yb==null)continue;
      const h=Math.max(2,yb-yt);
      const[r,g,b]=fvg.type==='bull'?[100,220,160]:[220,100,100];
      ctx.fillStyle=`rgba(${r},${g},${b},.09)`;ctx.strokeStyle=`rgba(${r},${g},${b},.32)`;
      ctx.lineWidth=.8;ctx.setLineDash([2,4]);
      ctx.fillRect(W*.18,yt,W*.76,h);ctx.strokeRect(W*.18,yt,W*.76,h);ctx.setLineDash([]);
    }
  }

  // ── SW ──
  if(showSW&&swData){
    for(const sw of swData){
      const y=p2y(sw.price);if(y==null)continue;
      const isH=sw.type==='high';
      ctx.strokeStyle=isH?'rgba(196,64,64,.38)':'rgba(61,170,98,.38)';
      ctx.lineWidth=.7;ctx.setLineDash([1,5]);
      ctx.beginPath();ctx.moveTo(W*.18,y);ctx.lineTo(W*.88,y);ctx.stroke();ctx.setLineDash([]);
    }
  }

  // ── SCORE ZONE 背景 ──
  const zones=calcScores();
  for(const z of zones){
    const yt=p2y(z.top),yb=p2y(z.bot);if(yt==null||yb==null)continue;
    const h=Math.max(2,yb-yt),alpha=.018+(z.score/z.maxScore)*.065;
    ctx.fillStyle=z.bias==='bull'?`rgba(61,170,98,${alpha})`:z.bias==='bear'?`rgba(196,64,64,${alpha})`:`rgba(201,147,42,${alpha})`;
    ctx.fillRect(W*.18,yt,W*.76,h);
  }

  // ── ENTRY ARROWS (時間軸紐づけ) ──
  if(showSIG){
    const sigs=calcEntrySignals();
    const blink=.55+.45*Math.sin(_phase);
    const dp=INST[currentInst].dp;
    const RX=W*.93; // 右端ライン終端（価格軸の手前）
    for(const sig of sigs){
      const y=p2y(sig.entryPrice);if(y==null)continue;
      // OB形成時刻のX座標（時間軸上に矢印を打つ）
      const rawAX=chart.timeScale().timeToCoordinate(sig.formationTime);
      // 画面外や左端すぎる場合はチャート左端に押しつけ
      const AX=rawAX==null?W*.20:Math.max(W*.19,Math.min(rawAX,RX-20));
      const isBull=sig.type==='bull',isStrong=sig.strength==='STRONG',isHot=sig.heat==='HOT';
      const[r,g,b]=isBull?[61,170,98]:[196,64,64];
      let alpha=isHot?1.0:sig.heat==='WARM'?.72:.30;
      if(isHot)alpha*=blink;
      const sz=isStrong?11:8;

      // ── OB形成バーに矢印 ──
      ctx.save();ctx.globalAlpha=alpha;
      ctx.fillStyle=`rgba(${r},${g},${b},${isStrong?1:.6})`;
      ctx.strokeStyle=`rgba(${r},${g},${b},1)`;ctx.lineWidth=isStrong?1.5:1;
      ctx.beginPath();
      if(isBull){ctx.moveTo(AX,y-sz);ctx.lineTo(AX+sz*.65,y+sz*.55);ctx.lineTo(AX-sz*.65,y+sz*.55);}
      else      {ctx.moveTo(AX,y+sz);ctx.lineTo(AX+sz*.65,y-sz*.55);ctx.lineTo(AX-sz*.65,y-sz*.55);}
      ctx.closePath();
      if(isStrong){ctx.fill();ctx.stroke();}else{ctx.globalAlpha=alpha*.45;ctx.fill();ctx.globalAlpha=alpha;ctx.stroke();}
      // HOT グロー
      if(isHot&&isStrong){
        ctx.globalAlpha=alpha*.2;ctx.fillStyle=`rgba(${r},${g},${b},.25)`;
        ctx.beginPath();
        if(isBull){ctx.moveTo(AX,y-sz-5);ctx.lineTo(AX+sz+4,y+sz*.55+4);ctx.lineTo(AX-sz-4,y+sz*.55+4);}
        else      {ctx.moveTo(AX,y+sz+5);ctx.lineTo(AX+sz+4,y-sz*.55-4);ctx.lineTo(AX-sz-4,y-sz*.55-4);}
        ctx.closePath();ctx.fill();
      }
      ctx.restore();

      // ── 矢印から右端まで水平ライン ──
      ctx.save();ctx.globalAlpha=alpha*.50;
      ctx.strokeStyle=`rgba(${r},${g},${b},${isStrong?.70:.40})`;
      ctx.lineWidth=isStrong?1.0:.7;ctx.setLineDash(isStrong?[5,3]:[3,5]);
      ctx.beginPath();ctx.moveTo(AX+(isBull?sz*.65:sz*.65)+2,y);ctx.lineTo(RX,y);ctx.stroke();
      ctx.setLineDash([]);ctx.restore();

      // ── 右端に現在のheat状態ラベル ──
      ctx.save();ctx.globalAlpha=alpha*.85;
      const labelTxt=isHot?'◉':isStrong?'★★':'★';
      ctx.font=isStrong?'bold 9px JetBrains Mono,monospace':'8px JetBrains Mono,monospace';
      ctx.fillStyle=`rgba(${r},${g},${b},1)`;ctx.textAlign='right';
      ctx.fillText(labelTxt,RX+14,y+(isBull?-sz-3:sz+11));
      ctx.textAlign='left';ctx.restore();

      // ── 形成時刻ラベル（矢印の真下/上） ──
      const jst=new Date((sig.formationTime+9*3600)*1000);
      const hh=String(jst.getUTCHours()).padStart(2,'0'),mm=String(jst.getUTCMinutes()).padStart(2,'0');
      const timeLbl=`${(jst.getMonth()+1)}/${jst.getUTCDate()} ${hh}:${mm}`;
      ctx.save();ctx.globalAlpha=alpha*.75;
      ctx.font='8px JetBrains Mono,monospace';
      ctx.fillStyle=`rgba(${r},${g},${b},.80)`;ctx.textAlign='center';
      // bullなら矢印の下、bearなら矢印の上
      const timeY=isBull?y+sz+12:y-sz-5;
      // 背景ブロック
      const tw=ctx.measureText(timeLbl).width;
      ctx.fillStyle=`rgba(6,5,4,.70)`;ctx.fillRect(AX-tw/2-2,timeY-8,tw+4,10);
      ctx.fillStyle=`rgba(${r},${g},${b},.80)`;
      ctx.fillText(timeLbl,AX,timeY);
      ctx.textAlign='left';ctx.restore();
    }
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  RIGHT PANEL + BOTTOM SHEET RENDER
// ═══════════════════════════════════════════════════════════
let _prevHash='';
function renderPanel(){
  if(!cSeries)return;
  const s=S[currentInst];if(!s.candles.length)return;
  const cfg=INST[currentInst],dp=cfg.dp;
  const cur=s.candles[s.candles.length-1].close;
  const sigs=calcEntrySignals(),zones=calcScores();
  const hash=[sigs.length,(obData.active||[]).length,fvgData.length,zones.length,cur.toFixed(dp)].join('|');
  if(hash===_prevHash)return;_prevHash=hash;

  const sigHtml=buildSigHtml(sigs,dp);
  const obHtml=buildObHtml(cur,dp);
  const fvgHtml=buildFvgHtml(cur,dp);
  const scoreHtml=buildScoreHtml(zones,dp);

  // Desktop
  document.getElementById('rpSigCnt').textContent=sigs.length?sigs.length+'件':'なし';
  document.getElementById('rpSigBody').innerHTML=sigHtml;
  document.getElementById('rpObCnt').textContent=(obData.active||[]).length+'件'+((obData.flip||[]).length?` +${obData.flip.length}F`:'');
  document.getElementById('rpObBody').innerHTML=obHtml;
  document.getElementById('rpFvgCnt').textContent=fvgData.length+'件';
  document.getElementById('rpFvgBody').innerHTML=fvgHtml;
  document.getElementById('rpScoreBody').innerHTML=scoreHtml;
  // Mobile bottom sheet
  document.getElementById('bsSig').innerHTML=sigHtml;
  document.getElementById('bsOb').innerHTML=obHtml;
  document.getElementById('bsFvg').innerHTML=fvgHtml;
  document.getElementById('bsScore').innerHTML=scoreHtml;
}
function buildSigHtml(sigs,dp){
  if(!sigs.length)return'<div class="empty-row">条件を満たすシグナルなし</div>';
  return sigs.map(sig=>{
    const isBull=sig.type==='bull',isStrong=sig.strength==='STRONG';
    const c=isBull?'#3DAA62':'#C44040';
    const heatCls=sig.heat.toLowerCase(),heatTxt=sig.heat==='HOT'?'● HOT':sig.heat==='WARM'?'○ WARM':'· COLD';
    // JST時刻フォーマット
    const jst=new Date((sig.formationTime+9*3600)*1000);
    const hh=String(jst.getUTCHours()).padStart(2,'0'),mm=String(jst.getUTCMinutes()).padStart(2,'0');
    const timeLbl=`${jst.getMonth()+1}/${jst.getUTCDate()} ${hh}:${mm} JST`;
    return`<div class="sig-card${isStrong?' sig-strong':''}">
      <div class="sig-top">
        <span class="sig-arrow" style="color:${c}">${isBull?'▲':'▼'}</span>
        <span class="sig-str ${isStrong?'strong':'normal'}">${isStrong?'★★':'★'} ${isStrong?'STRONG':'NORMAL'}</span>
        <span class="sig-heat ${heatCls}">${heatTxt}</span>
      </div>
      <div class="sig-price" style="color:${c}">${sig.entryPrice.toFixed(dp)}</div>
      <div class="sig-tags">${sig.tags.join(' + ')}</div>
      <div style="font-size:8px;color:var(--txt-dd);margin-top:2px;letter-spacing:.5px">⏱ ${timeLbl}</div>
    </div>`;
  }).join('');
}
function buildObHtml(cur,dp){
  const actObs=obData.active||[];
  if(!actObs.length)return'<div class="empty-row">なし</div>';
  const sorted=[...actObs].sort((a,b)=>Math.abs((a.top+a.bottom)/2-cur)-Math.abs((b.top+b.bottom)/2-cur));
  return sorted.map(ob=>{
    const isBull=ob.type==='bull';
    const c=isBull?'rgba(100,160,255,':'rgba(255,100,100,';
    const ga=ob.grade==='S'?1.0:ob.grade==='A'?.85:ob.grade==='B'?.65:.45;
    const vK=ob.volume>=1000?(ob.volume/1000).toFixed(1)+'K':ob.volume.toFixed(0);
    const inZone=cur>=ob.bottom&&cur<=ob.top;
    const bg=inZone?`background:${c}.08);`:'';
    // B/C はパネルに薄く表示
    const dimStyle=ob.grade==='B'||ob.grade==='C'?'opacity:.65;':''
    return`<div class="ob-row" style="${bg}${dimStyle}">
      <span style="font-size:9px;color:${c}${ga})">${isBull?'▲':'▼'}</span>
      <span class="ob-grade" style="color:${c}${ga})">${ob.grade}</span>
      <div class="ob-price">${ob.top.toFixed(dp)}<br>${ob.bottom.toFixed(dp)}</div>
      <div class="ob-meta">${ob.touches?ob.touches+'T':'-'}<br>${vK}</div>
    </div>`;
  }).join('');
}
function buildFvgHtml(cur,dp){
  if(!fvgData.length)return'<div class="empty-row">なし</div>';
  const sorted=[...fvgData].sort((a,b)=>Math.abs((a.top+a.bottom)/2-cur)-Math.abs((b.top+b.bottom)/2-cur));
  return sorted.map(fvg=>{
    const isBull=fvg.type==='bull';
    const c=isBull?'rgba(100,220,160,.70)':'rgba(220,100,100,.70)';
    const bg=cur>=fvg.bottom&&cur<=fvg.top?`background:${isBull?'rgba(100,220,160,.06)':'rgba(220,100,100,.06)'};`:'';
    return`<div class="fvg-row" style="${bg}"><span class="fvg-type" style="color:${c}">${isBull?'FVG▲':'FVG▼'}</span><div class="fvg-price">${fvg.top.toFixed(dp)}<br>${fvg.bottom.toFixed(dp)}</div></div>`;
  }).join('');
}
function buildScoreHtml(zones,dp){
  if(!zones.length)return'<div class="empty-row">集積なし</div>';
  return zones.map(z=>{
    const pct=Math.round(z.score/z.maxScore*100);
    const cls=z.bias==='bull'?'sc-bull':z.bias==='bear'?'sc-bear':'sc-neu';
    const bc=z.bias==='bull'?'#3DAA62':z.bias==='bear'?'#C44040':'#5A4E24';
    const blbl=z.bias==='bull'?'BULL':z.bias==='bear'?'BEAR':'NEU';
    return`<div class="score-card">
      <div class="sc-top"><span class="sc-mid">${z.mid.toFixed(dp)}</span><span class="sc-badge ${cls}">${blbl} ${z.score}/${z.maxScore}</span></div>
      <div class="sc-range">${z.bot.toFixed(dp)} – ${z.top.toFixed(dp)}</div>
      <div class="sc-tags">${z.tags.join(' + ')}</div>
      <div class="sc-bar-wrap"><div class="sc-bar" style="width:${pct}%;background:${bc}"></div></div>
    </div>`;
  }).join('');
}

//  OVERLAY / CLOCK / ALERT / COPY
// ═══════════════════════════════════════════════════════════
function showOverlay(show,msg='',isErr=false){
  const ov=document.getElementById('overlay');ov.classList.toggle('hidden',!show);
  if(msg)document.getElementById('ov-sub').textContent=msg;
  document.querySelector('.spinner').style.display=isErr?'none':'block';
  document.querySelector('.ov-title').style.color=isErr?'#C44040':'var(--gold-d)';
  document.querySelector('.ov-title').textContent=isErr?'ERROR':'LOADING';
}
function tick(){
  const now=new Date(),jst=new Date(now.getTime()+(9*60+now.getTimezoneOffset())*60000);
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('clk').textContent=p(jst.getUTCHours())+':'+p(jst.getUTCMinutes())+':'+p(jst.getUTCSeconds());
  const h=now.getUTCHours();let sess='OFF';
  if(h>=23||h<6)sess='TOKYO';else if(h<8)sess='TK/LN';else if(h<14)sess='LONDON';else if(h<16)sess='LN/NY';else if(h<21)sess='NY';
  document.getElementById('sessBadge').textContent=sess;
}
let alerts=[],lastAlertPrice=null,audioCtx=null;
function getACtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playAlert(type){try{const ctx=getACtx(),osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.frequency.value=type==='bull'?880:440;osc.type='sine';g.gain.setValueAtTime(.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.6);osc.start();osc.stop(ctx.currentTime+.6);}catch(e){}}
function addAlert(){
  const price=parseFloat(document.getElementById('alertPrice').value),dir=document.getElementById('alertDir').value;
  if(isNaN(price)){document.getElementById('alertHint').textContent='価格を入力';return;}
  document.getElementById('alertHint').textContent='';
  alerts.push({id:Date.now(),price,dir,fired:false,inst:currentInst});renderAlerts();document.getElementById('alertPrice').value='';
}
function removeAlert(id){alerts=alerts.filter(a=>a.id!==id);renderAlerts();}
function renderAlerts(){
  const el=document.getElementById('alertList');
  if(!alerts.length){el.innerHTML='<span class="alert-hint">なし</span>';return;}
  el.innerHTML=alerts.map(a=>`<div class="alert-tag${a.fired?' fired':''}" id="at_${a.id}">${INST[a.inst].name} ${a.price} ${a.dir==='cross'?'✕':a.dir==='above'?'↑':'↓'}<button onclick="removeAlert(${a.id})">✕</button></div>`).join('');
}
function checkAlerts(cur){
  if(lastAlertPrice===null){lastAlertPrice=cur;return;}
  for(const al of alerts){
    if(al.fired||al.inst!==currentInst)continue;
    let trig=false;
    if(al.dir==='cross')trig=(lastAlertPrice<al.price&&cur>=al.price)||(lastAlertPrice>al.price&&cur<=al.price);
    if(al.dir==='above')trig=lastAlertPrice<al.price&&cur>=al.price;
    if(al.dir==='below')trig=lastAlertPrice>al.price&&cur<=al.price;
    if(trig){al.fired=true;const t=document.getElementById('at_'+al.id);if(t)t.classList.add('fired');playAlert(cur>=al.price?'bull':'bear');if(Notification.permission==='granted')new Notification(INST[al.inst].name+' アラート',{body:al.price+' 到達'});}
  }
  lastAlertPrice=cur;
}
function toggleAlert(){document.getElementById('alertPanel').classList.toggle('open');if(Notification.permission==='default')Notification.requestPermission();}
renderAlerts();

async function copyChart(){
  const btn=document.getElementById('copyBtn');btn.textContent='⏳';btn.className='icon-btn';
  try{
    const area=document.getElementById('chartArea'),vpCvs=document.getElementById('vp-canvas');
    const comp=document.createElement('canvas');comp.width=area.offsetWidth;comp.height=area.offsetHeight;
    const ctx=comp.getContext('2d');ctx.fillStyle='#060504';ctx.fillRect(0,0,comp.width,comp.height);
    const ar=area.getBoundingClientRect();
    for(const c of document.getElementById('lw').querySelectorAll('canvas')){const cr=c.getBoundingClientRect();try{ctx.drawImage(c,cr.left-ar.left,cr.top-ar.top,cr.width,cr.height);}catch(e){}}
    ctx.drawImage(vpCvs,0,0);
    const cfg=INST[currentInst],price=document.getElementById('pMain').textContent,tf=document.querySelector('#mainTfrow .tf.on')?.textContent||'';
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,comp.width,28);
    ctx.font='bold 11px JetBrains Mono,monospace';ctx.fillStyle=cfg.accentL;ctx.fillText(cfg.name,7,18);
    ctx.fillStyle='#D4C080';ctx.fillText(price,7+ctx.measureText(cfg.name).width+7,18);
    ctx.font='8px JetBrains Mono,monospace';ctx.fillStyle='#5A4E24';ctx.fillText(tf+'  '+new Date().toLocaleString('ja-JP'),comp.width-175,18);
    comp.toBlob(async blob=>{
      try{await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);btn.textContent='✓';btn.className='icon-btn ok';}
      catch(e){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=cfg.name+'_'+tf+'_'+Date.now()+'.png';a.click();btn.textContent='↓';btn.className='icon-btn ok';}
      setTimeout(()=>{btn.textContent='📋';btn.className='icon-btn';},2500);
    },'image/png');
  }catch(e){btn.textContent='✗';btn.className='icon-btn err';setTimeout(()=>{btn.textContent='📋';btn.className='icon-btn';},2500);}
}
async function copyAllChart(){
  const btn=document.getElementById('copyBtnAll');btn.textContent='⏳';btn.className='icon-btn';
  try{
    const grid=document.getElementById('allGrid'),comp=document.createElement('canvas');comp.width=grid.offsetWidth;comp.height=grid.offsetHeight;
    const ctx=comp.getContext('2d');ctx.fillStyle='#060504';ctx.fillRect(0,0,comp.width,comp.height);
    const gr=grid.getBoundingClientRect();
    for(const iid of ['gold','silver','btc']){const cfg=INST[iid],el=document.getElementById(cfg.miniLw);if(!el)continue;for(const c of el.querySelectorAll('canvas')){const cr=c.getBoundingClientRect();try{ctx.drawImage(c,cr.left-gr.left,cr.top-gr.top,cr.width,cr.height);}catch(e){}}}
    ctx.font='8px JetBrains Mono,monospace';ctx.fillStyle='#5A4E24';ctx.fillText('ALL  '+currentTF+'  '+new Date().toLocaleString('ja-JP'),5,comp.height-4);
    comp.toBlob(async blob=>{
      try{await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);btn.textContent='✓';btn.className='icon-btn ok';}
      catch(e){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ALL_'+currentTF+'_'+Date.now()+'.png';a.click();btn.textContent='↓';btn.className='icon-btn ok';}
      setTimeout(()=>{btn.textContent='📋';btn.className='icon-btn';},2500);
    },'image/png');
  }catch(e){btn.textContent='✗';btn.className='icon-btn err';setTimeout(()=>{btn.textContent='📋';btn.className='icon-btn';},2500);}
}
