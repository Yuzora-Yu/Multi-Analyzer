<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VERIFY DASHBOARD</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9932A;--gold-l:#E8B84B;--gold-d:#7A5510;
  --bg:#060504;--s1:#0C0A06;--s2:#0f0d08;--border:#1E1708;
  --txt:#D4C080;--txt-d:#5A4E24;--txt-dd:#2E2710;
  --up:#3DAA62;--dn:#C44040;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace;overflow:hidden}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 150 150' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.025'/%3E%3C/svg%3E")}
.app{display:flex;flex-direction:column;height:100vh;padding:5px 7px;gap:4px}

/* ── TABS ── */
.tab-row{display:flex;gap:3px;flex-shrink:0}
.tab{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;padding:3px 14px;
  border:1px solid var(--border);border-radius:2px;cursor:pointer;transition:.1s;color:var(--txt-d);background:none}
.tab:hover{color:var(--txt)}
.tab[data-id="gold"].on  {color:#060504;background:linear-gradient(110deg,#7A5510,#C9932A);border-color:#C9932A}
.tab[data-id="btc"].on   {color:#060504;background:linear-gradient(110deg,#7A4A0D,#F7931A);border-color:#F7931A}
.tab[data-id="silver"].on{color:#060504;background:linear-gradient(110deg,#404058,#9090C0);border-color:#9090C0}

/* ── HDR ── */
.hdr{display:flex;align-items:center;gap:9px;height:32px;flex-shrink:0}
.sym{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;line-height:1;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sym-gold  {background:linear-gradient(110deg,var(--gold-d),var(--gold),var(--gold-l))}
.sym-btc   {background:linear-gradient(110deg,#7A4A0D,#F7931A,#FFBB44)}
.sym-silver{background:linear-gradient(110deg,#505070,#A0A0C8,#D0D0E8)}
.sep{width:1px;height:16px;background:var(--border);flex-shrink:0}
.price-big{font-size:20px;font-weight:500;letter-spacing:1px}
.price-chg{font-size:10px;padding:1px 5px;border-radius:2px}
.up-bg{background:rgba(61,170,98,.15);color:var(--up)}.dn-bg{background:rgba(196,64,64,.15);color:var(--dn)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:7px;flex-shrink:0}
.session-badge{font-size:8px;letter-spacing:1px;border:1px solid var(--border);padding:2px 6px;border-radius:2px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--up);box-shadow:0 0 6px var(--up);animation:blink 2s infinite;flex-shrink:0}
.dot.inactive{background:var(--txt-dd);box-shadow:none;animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.clk{font-size:10px;color:var(--txt-d)}

/* ── TOP BAR ── */
.top-bar{display:flex;gap:5px;height:50px;flex-shrink:0}
.tb-card{background:var(--s1);border:1px solid var(--border);border-radius:3px;
  padding:4px 9px;display:flex;flex-direction:column;justify-content:center;gap:2px}
.tb-lbl{font-size:7px;letter-spacing:1px;color:var(--txt-dd)}
.tb-val{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px}
.vb-bull{color:var(--up)}.vb-bear{color:var(--dn)}.vb-neu{color:var(--txt-d)}
.bias-group{display:flex;gap:4px}
.bias-item{background:var(--s1);border:1px solid var(--border);border-radius:3px;
  padding:4px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;min-width:52px}
.bi-lbl{font-size:7px;letter-spacing:1px;color:var(--txt-dd)}
.bi-val{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px}
.pd-card{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:3px;padding:4px 9px}
.pd-lbl{font-size:7px;letter-spacing:1px;color:var(--txt-dd);margin-bottom:3px}
.pd-track{position:relative;height:9px;background:var(--border);border-radius:4px;overflow:visible;margin:2px 0}
.pd-disc{position:absolute;left:0;top:0;height:100%;width:38%;background:rgba(61,170,98,.20);border-radius:4px 0 0 4px}
.pd-prem{position:absolute;right:0;top:0;height:100%;width:38%;background:rgba(196,64,64,.20);border-radius:0 4px 4px 0}
.pd-oteb{position:absolute;left:21%;top:0;height:100%;width:17%;background:rgba(61,170,98,.40)}
.pd-otes{position:absolute;right:21%;top:0;height:100%;width:17%;background:rgba(196,64,64,.40)}
.pd-eq{position:absolute;left:50%;top:-2px;width:1px;height:13px;background:var(--txt-d)}
.pd-cur{position:absolute;top:-3px;width:7px;height:15px;border-radius:2px;transform:translateX(-50%);transition:left .3s}
.pd-lbls{display:flex;justify-content:space-between;font-size:7px;color:var(--txt-dd);margin-top:1px}
.kz-card{background:var(--s1);border:1px solid var(--border);border-radius:3px;
  padding:4px 9px;display:flex;flex-direction:column;justify-content:center;gap:2px;min-width:90px}
.score-card-top{background:var(--s1);border:1px solid var(--border);border-radius:3px;
  padding:4px 9px;display:flex;flex-direction:column;justify-content:center;gap:2px;min-width:75px}
.sc-num{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}
.sc-bar-w{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:2px}
.sc-bar{height:100%;border-radius:2px;transition:width .5s,background .5s}

/* ── TF ROW ── */
.tfrow-wrap{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.tfrow{display:flex;gap:3px;align-items:center;flex-shrink:0}
.tfl{font-size:8px;color:var(--txt-d);letter-spacing:1px;margin-right:2px}
.tf,.tf-toggle,.icon-btn{background:none;border:1px solid var(--border);color:var(--txt-d);
  font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;cursor:pointer;border-radius:2px;transition:.1s}
.tf:hover,.tf-toggle:hover,.icon-btn:hover{border-color:var(--gold-d);color:var(--gold)}
.tf.on{border-color:var(--gold);color:var(--gold);background:rgba(201,147,42,.07)}
.tf-toggle.on{border-color:var(--gold);color:var(--gold);background:rgba(201,147,42,.07)}
.icon-btn.ok{border-color:var(--up);color:var(--up)}.icon-btn.err{border-color:var(--dn);color:var(--dn)}
.ml-auto{margin-left:auto}

/* ── MAIN ── */
.main-row{flex:1;min-height:0;display:flex;gap:5px}
.chart-wrap{flex:1;min-width:0;position:relative;border:1px solid var(--border);border-radius:3px;overflow:hidden}
.chart-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-d),transparent);z-index:1;pointer-events:none}
#vLw{position:absolute;inset:0}
#vCvs{position:absolute;top:0;left:0;pointer-events:none;z-index:10}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;background:rgba(6,5,4,.90);z-index:50;pointer-events:none}
.overlay.hidden{display:none}
.ov-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--gold-d)}
.ov-sub{font-size:9px;color:var(--txt-d);text-align:center;max-width:240px;line-height:1.5}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LIQ PANEL ── */
.liq-panel{width:108px;flex-shrink:0;background:var(--s2);border:1px solid var(--border);border-radius:3px;display:flex;flex-direction:column;overflow:hidden}
.lp-hdr{padding:3px 6px;border-bottom:1px solid var(--border);background:var(--s1);font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;color:var(--txt-d);flex-shrink:0}
.lp-body{flex:1;overflow-y:auto;padding:2px 0}
.lp-body::-webkit-scrollbar{width:2px}.lp-body::-webkit-scrollbar-thumb{background:var(--border)}
.lp-row{display:flex;align-items:center;gap:3px;padding:3px 6px;border-bottom:1px solid rgba(30,23,8,.4)}
.lp-row:last-child{border-bottom:none}
.lp-type{font-size:8px;width:30px;letter-spacing:.5px}
.lp-price{font-size:9px;flex:1}
.lp-dist{font-size:8px;color:var(--txt-dd);text-align:right}
.lp-empty{padding:5px 6px;font-size:8px;color:var(--txt-dd)}

/* ── ENTRY CARD ── */
.entry-card{flex-shrink:0;border:1px solid var(--border);border-radius:3px;background:var(--s1);overflow:hidden}
.ec-none{padding:5px 12px;font-size:8px;color:var(--txt-dd);letter-spacing:1px}
.ec-inner{display:flex;gap:0}
.ec-main{flex:1;padding:6px 12px;border-right:1px solid var(--border)}
.ec-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.ec-dir{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px}
.ec-grade{font-family:'Bebas Neue',sans-serif;font-size:11px;padding:1px 7px;border-radius:2px}
.ec-ga{background:rgba(61,170,98,.20);color:var(--up)}
.ec-gb{background:rgba(232,184,75,.20);color:var(--gold)}
.ec-gc{background:rgba(90,78,36,.15);color:var(--txt-d)}
.ec-gd{background:rgba(196,64,64,.10);color:var(--dn)}
.ec-levels{display:flex;gap:12px}
.ec-lv{display:flex;flex-direction:column;gap:1px}
.ec-lv-lbl{font-size:7px;color:var(--txt-dd);letter-spacing:1px}
.ec-lv-val{font-size:11px;font-weight:500}
.ec-side{width:125px;flex-shrink:0;padding:5px 9px;display:flex;flex-direction:column;gap:3px}
.ec-bd{display:flex;justify-content:space-between;align-items:center}
.ec-bd-lbl{font-size:8px;color:var(--txt-dd);width:40px}
.ec-bd-bar{flex:1;height:3px;background:var(--border);border-radius:1px;margin:0 4px;overflow:hidden}
.ec-bd-fill{height:100%;border-radius:1px}
.ec-bd-pts{font-size:8px;min-width:18px;text-align:right}

/* ── STATUS ── */
.statusbar{flex-shrink:0;display:flex;align-items:center;gap:10px;height:18px;border-top:1px solid var(--border);padding-top:2px}
.stat{font-size:8px;letter-spacing:.5px;color:var(--txt-d)}
.stat span{color:var(--txt);margin-left:2px}
#vStatusMsg{margin-left:auto;font-size:8px;color:var(--txt-d)}

@media(max-width:600px){
  .app{padding:3px 4px;gap:2px}
  .ec-side{display:none}
  .liq-panel{width:76px}
  /* top-bar: 縦並びにして全部見せる */
  .top-bar{height:auto;flex-wrap:wrap;gap:3px}
  .bias-group{flex-shrink:0}
  .pd-card{min-width:120px;flex:1}
  .kz-card{min-width:80px}
  .score-card-top{min-width:60px}
  /* TFボタン小さく */
  .tf,.tf-toggle,.icon-btn{font-size:9px;padding:2px 5px}
  .tfl{display:none}
  /* HDR 詰める */
  .hdr{height:28px;gap:6px}
  .sym{font-size:18px}
  .price-big{font-size:17px}
  .clk{display:none}
}
</style>
</head>
<body>
<div class="app">

  <!-- TABS -->
  <div class="tab-row">
    <button class="tab on" data-id="gold"   onclick="switchInst('gold',this)">GOLD</button>
    <button class="tab"    data-id="btc"    onclick="switchInst('btc',this)">BTC</button>
    <button class="tab"    data-id="silver" onclick="switchInst('silver',this)">SILVER</button>
  </div>

  <!-- HDR -->
  <div class="hdr">
    <div class="sym sym-gold" id="symLabel">GOLD</div>
    <div class="sep"></div>
    <div class="price-big" id="pMain" style="color:var(--gold-l)">—</div>
    <div class="price-chg" id="pChg">—</div>
    <div class="hdr-right">
      <div class="session-badge" id="sessBadge" style="color:var(--gold-d)">—</div>
      <div class="dot" id="rtDot"></div>
      <div class="clk" id="clk">—</div>
    </div>
  </div>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="bias-group">
      <div class="bias-item"><div class="bi-lbl">1H</div><div class="bi-val vb-neu" id="vBias1h">—</div></div>
      <div class="bias-item"><div class="bi-lbl">4H</div><div class="bi-val vb-neu" id="vBias4h">—</div></div>
      <div class="bias-item"><div class="bi-lbl">STRUCT</div><div class="bi-val vb-neu" id="vBiasStruct">—</div></div>
    </div>
    <div class="pd-card">
      <div class="pd-lbl">PREMIUM / DISCOUNT</div>
      <div class="pd-track">
        <div class="pd-disc"></div><div class="pd-prem"></div>
        <div class="pd-oteb"></div><div class="pd-otes"></div>
        <div class="pd-eq"></div>
        <div class="pd-cur" id="vPDCur" style="left:50%;background:var(--txt-d)"></div>
      </div>
      <div class="pd-lbls"><span>DISC</span><span>OTE▲</span><span>EQ</span><span>OTE▼</span><span>PREM</span></div>
    </div>
    <div class="kz-card">
      <div class="tb-lbl">SESSION / KZ</div>
      <div class="tb-val" id="vKZ" style="font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:500">—</div>
      <div style="font-size:8px;color:var(--txt-dd)" id="vKZNext">—</div>
    </div>
    <div class="score-card-top">
      <div class="tb-lbl">SCORE</div>
      <div class="sc-num" id="vScoreNum" style="color:var(--txt-d)">—</div>
      <div class="sc-bar-w"><div class="sc-bar" id="vScoreBar" style="width:0"></div></div>
    </div>
  </div>

  <!-- TF ROW (2行構成) -->
  <div class="tfrow-wrap">
    <div class="tfrow">
      <span class="tfl">TF</span>
      <button class="tf"    onclick="setTF('1m',this)">1m</button>
      <button class="tf on" id="tfActive" onclick="setTF('5m',this)">5m</button>
      <button class="tf"    onclick="setTF('15m',this)">15m</button>
      <button class="tf"    onclick="setTF('1h',this)">1H</button>
      <button class="tf"    onclick="setTF('4h',this)">4H</button>
      <button class="tf"    onclick="setTF('1d',this)">1D</button>
      <button class="tf"    onclick="setTF('1wk',this)">1W</button>
    </div>
    <div class="tfrow">
      <button class="tf-toggle on" id="togBOS" onclick="tog('BOS',this)">BOS</button>
      <button class="tf-toggle on" id="togFVG" onclick="tog('FVG',this)">FVG</button>
      <button class="tf-toggle on" id="togLIQ" onclick="tog('LIQ',this)">LIQ</button>
      <button class="tf-toggle on" id="togSES" onclick="tog('SES',this)">SES</button>
      <button class="icon-btn ml-auto" onclick="reload()">↺ RELOAD</button>
      <button class="icon-btn" id="cpBtn" onclick="copyChart()">📋 コピー</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-row">
    <div class="chart-wrap" id="chartArea">
      <div id="vLw"></div>
      <canvas id="vCvs"></canvas>
      <div class="overlay" id="overlay">
        <div class="spinner"></div>
        <div class="ov-title">LOADING</div>
        <div class="ov-sub" id="ovSub">取得中...</div>
      </div>
    </div>
    <div class="liq-panel">
      <div class="lp-hdr">LIQUIDITY</div>
      <div class="lp-body" id="liqPanel"></div>
    </div>
  </div>

  <!-- ENTRY CARD -->
  <div class="entry-card" id="entryCard">
    <div class="ec-none">データ取得後にエントリー候補を表示します</div>
  </div>

  <!-- STATUS -->
  <div class="statusbar">
    <div class="stat">HIGH<span id="stHigh">—</span></div>
    <div class="sep" style="height:10px"></div>
    <div class="stat">LOW<span id="stLow">—</span></div>
    <div class="sep" style="height:10px"></div>
    <div class="stat">ATR<span id="stATR">—</span></div>
    <div class="sep" style="height:10px"></div>
    <div class="stat">OB<span id="stOB">—</span></div>
    <div class="sep" style="height:10px"></div>
    <div class="stat">SRC<span id="stSrc">—</span></div>
    <div id="vStatusMsg">起動中...</div>
  </div>

</div>
<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const INST={
  gold:  {name:'GOLD',  sym:'XAUUSDT', src:'fapi', wsStream:'xauusdt', dp:2, accent:'var(--gold-l)', cls:'sym-gold',   sessType:'metal'},
  btc:   {name:'BTC',   sym:'BTCUSDT', src:'spot', wsStream:'btcusdt', dp:2, accent:'#F7931A',       cls:'sym-btc',    sessType:'crypto'},
  silver:{name:'SILVER',sym:'XAGUSDT', src:'fapi', wsStream:'xagusdt', dp:4, accent:'#C0C0D8',       cls:'sym-silver', sessType:'metal'},
};
const BN_INT ={'1m':'1m','5m':'5m','15m':'15m','1h':'1h','4h':'4h','1d':'1d','1wk':'1w'};
const BN_LIM ={'1m':1000,'5m':1000,'15m':1000,'1h':1000,'4h':500,'1d':730,'1wk':300};
const YH_INT ={'1m':['1m','1d'],'5m':['5m','5d'],'15m':['15m','1mo'],'1h':['60m','3mo'],'4h':['60m','6mo'],'1d':['1d','2y'],'1wk':['1wk','10y']};
const SHOW_B ={'1m':150,'5m':120,'15m':120,'1h':80,'4h':60,'1d':90,'1wk':60};
const OB_AGE ={S:Infinity,A:Infinity,B:150,C:60};
const VP_N=60;

// ═══════════════════════════════════════════════════════════
//  SHARED STATE
// ═══════════════════════════════════════════════════════════
const VS={};
for(const id of ['gold','btc','silver'])
  VS[id]={candles:[],c1h:[],c4h:[],isFirstLoad:true,
    ws:null,wsTimer:null,wsFailCount:0,pollTimer:null,pollTimer2:null,
    structure:{events:[],trend:'neutral',swingHighs:[],swingLows:[]},
    liquidity:[],sessions:{},pd:{ratio:.5,zone:'EQ'},
    atr:0,htfBias:{h1:'neutral',h4:'neutral'},
    score:0,bd:{},entry:null};

let chart=null,cSeries=null,volSeries=null;
let currentInst='gold',currentTF='5m';
let showBOS=true,showFVG=true,showLIQ=true,showSES=true;
let _phase=0,_panelTimer=null,_resizeObs=null;

// ═══════════════════════════════════════════════════════════
//  FETCH
// ═══════════════════════════════════════════════════════════
async function fetchCandles(instId,tf,lim){
  const cfg=INST[instId];
  return fetchBinance(cfg,tf,lim);
}

async function fetchBinance(cfg,tf,lim){
  const bnInt=BN_INT[tf]||'5m';
  const limit=lim||BN_LIM[tf]||500;
  const urls=cfg.src==='fapi'?[
    `https://fapi.binance.com/fapi/v1/klines?symbol=${cfg.sym}&interval=${bnInt}&limit=${limit}`,
    `http://localhost:8001/klines?symbol=${cfg.sym}&interval=${bnInt}&limit=${limit}`,
  ]:[
    `https://api.binance.com/api/v3/klines?symbol=${cfg.sym}&interval=${bnInt}&limit=${limit}`,
    `http://localhost:8001/klines?symbol=${cfg.sym}&interval=${bnInt}&limit=${limit}`,
  ];
  for(const url of urls){
    try{const r=await fetch(url);if(!r.ok)continue;
      const d=await r.json();if(!Array.isArray(d)||!d.length)continue;
      return d.map(x=>({time:Math.floor(x[0]/1000),open:+x[1],high:+x[2],low:+x[3],close:+x[4],volume:+x[5]}));
    }catch(e){}
  }
  throw new Error('Binance fetch failed');
}

async function fetchYahoo(sym,tf){
  const[interval,range]=YH_INT[tf]||YH_INT['5m'];
  const base=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=${interval}&range=${range}&includePrePost=false`;
  const urls=[base,`https://corsproxy.io/?${encodeURIComponent(base)}`];
  for(const url of urls){
    try{
      const r=await fetch(url,{headers:{'Accept':'application/json'}});
      if(!r.ok)continue;
      const d=await r.json();
      const res=d?.chart?.result?.[0];if(!res)continue;
      const ts=res.timestamp;const q=res.indicators.quote[0];
      let candles=ts.map((t,i)=>({
        time:t,open:q.open[i]||0,high:q.high[i]||0,low:q.low[i]||0,close:q.close[i]||0,volume:q.volume[i]||0
      })).filter(c=>c.close>0&&c.open>0);
      // Aggregate to 4h from 1h if needed
      if(tf==='4h')candles=aggCandles(candles,4);
      return candles;
    }catch(e){}
  }
  throw new Error('Yahoo Finance fetch failed — CORS制限の可能性があります。ローカルサーバー(proxy.py)を起動してください。');
}

function aggCandles(candles,n){
  const out=[];
  for(let i=0;i<candles.length;i+=n){
    const ch=candles.slice(i,i+n);if(!ch.length)continue;
    out.push({time:ch[0].time,open:ch[0].open,high:Math.max(...ch.map(c=>c.high)),
      low:Math.min(...ch.map(c=>c.low)),close:ch[ch.length-1].close,volume:ch.reduce((s,c)=>s+c.volume,0)});
  }
  return out;
}

//  WEBSOCKET / POLLING

function connectRT(instId){
  stopRT(instId);
  connectWS(instId);
}

function connectWS(instId){
  const s=VS[instId],cfg=INST[instId];
  if(s.wsFailCount>=5){startFallbackPoll(instId);return;}
  const bnInt=BN_INT[currentTF]||'5m';
  const url=cfg.src==='fapi'
    ?`wss://fstream.binance.com/ws/${cfg.wsStream}@kline_${bnInt}`
    :`wss://stream.binance.com:9443/ws/${cfg.wsStream}@kline_${bnInt}`;
  const ws=new WebSocket(url);s.ws=ws;let opened=false;
  ws.onopen=()=>{opened=true;s.wsFailCount=0;setRTStatus(instId,true,'⚡RT');};
  ws.onerror=()=>{};
  ws.onclose=()=>{
    if(!opened)s.wsFailCount++;
    const d=opened?5000:Math.min(3000*Math.pow(2,s.wsFailCount),30000);
    if(s.wsFailCount<5)s.wsTimer=setTimeout(()=>connectWS(instId),d);
    else startFallbackPoll(instId);
  };
  ws.onmessage=e=>{
    try{const k=JSON.parse(e.data).k;if(!k)return;
      onTick(instId,{time:Math.floor(k.t/1000),open:+k.o,high:+k.h,low:+k.l,close:+k.c,volume:+k.v});
    }catch(ex){}
  };
}

function startYahooPoll(instId){
  const s=VS[instId],cfg=INST[instId];
  setRTStatus(instId,false,'↺ polling 30s');
  // Poll recent candles every 30s
  s.pollTimer=setInterval(async()=>{
    try{
      const cs=await fetchYahoo(cfg.sym,'1m');if(!cs.length)return;
      const c=cs[cs.length-1];
      onTick(instId,c);
    }catch(e){}
  },30000);
}

function startFallbackPoll(instId){
  const s=VS[instId],cfg=INST[instId];
  setRTStatus(instId,false,'↺ polling 15s');
  s.pollTimer2=setInterval(async()=>{
    try{const cs=await fetchBinance(cfg,currentTF,5);if(!cs.length)return;onTick(instId,cs[cs.length-1]);}catch(e){}
  },15000);
}

function stopRT(instId){
  const s=VS[instId];
  if(s.ws){try{s.ws.close();}catch(e){}s.ws=null;}
  clearTimeout(s.wsTimer);
  if(s.pollTimer){clearInterval(s.pollTimer);s.pollTimer=null;}
  if(s.pollTimer2){clearInterval(s.pollTimer2);s.pollTimer2=null;}
}

function setRTStatus(instId,live,msg){
  if(instId!==currentInst)return;
  document.getElementById('rtDot').className='dot'+(live?'':' inactive');
  document.getElementById('vStatusMsg').textContent=(document.getElementById('vStatusMsg').textContent.split('|')[0]||'')+' | '+msg;
}

function onTick(instId,c){
  const s=VS[instId],cfg=INST[instId];
  if(s.candles.length){
    const last=s.candles[s.candles.length-1];
    if(last.time===c.time)s.candles[s.candles.length-1]=c;
    else if(c.time>last.time)s.candles.push(c);
  }
  if(instId===currentInst&&cSeries){
    try{cSeries.update({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close});}catch(e){}
    try{volSeries.update({time:c.time,value:c.volume,color:c.close>=c.open?'rgba(61,170,98,.25)':'rgba(196,64,64,.25)'});}catch(e){}
    const prev=s.candles[s.candles.length-2]||c;
    const da=c.close-prev.close,dp=(da/prev.close*100).toFixed(2);
    document.getElementById('pMain').textContent=c.close.toFixed(cfg.dp);
    const el=document.getElementById('pChg');el.textContent=(da>=0?'+':'')+da.toFixed(cfg.dp)+' ('+dp+'%)';
    el.className='price-chg '+(da>=0?'up-bg':'dn-bg');
  }
  // Periodic recalc
  if(!onTick._n)onTick._n={};
  onTick._n[instId]=(onTick._n[instId]||0)+1;
  if(instId===currentInst&&onTick._n[instId]%30===0)updateMarkers();
}

function calcVP(candles){
  if(!candles.length)return{buckets:[],poc:null,vah:null,val:null};
  const hi=Math.max(...candles.map(c=>c.high)),lo=Math.min(...candles.map(c=>c.low));
  const step=(hi-lo)/VP_N;if(step<=0)return{buckets:[],poc:null,vah:null,val:null};
  const vols=new Float64Array(VP_N);
  for(const c of candles){
    const b0=Math.max(0,Math.floor((c.low-lo)/step)),b1=Math.min(VP_N-1,Math.floor((c.high-lo)/step));
    const vpp=c.volume/(b1-b0+1);for(let i=b0;i<=b1;i++)vols[i]+=vpp;
  }
  const maxV=Math.max(...vols),totV=vols.reduce((a,b)=>a+b,0),pocI=Array.from(vols).indexOf(maxV);
  let vaV=vols[pocI],va0=pocI,va1=pocI;
  while(vaV<totV*.70&&(va0>0||va1<VP_N-1)){
    const up=va1<VP_N-1?vols[va1+1]:0,dn=va0>0?vols[va0-1]:0;
    if(up>=dn){va1++;vaV+=vols[va1];}else{va0--;vaV+=vols[va0];}
  }
  return{buckets:Array.from(vols).map((v,i)=>({priceFrom:lo+i*step,priceTo:lo+(i+1)*step,priceMid:lo+(i+.5)*step,
    volume:v,ratio:maxV>0?v/maxV:0,isPOC:i===pocI,inVA:i>=va0&&i<=va1})),
    poc:lo+(pocI+.5)*step,vah:lo+(va1+1)*step,val:lo+va0*step};
}

function calcOB(candles){
  const obs=[],sw=3,n=candles.length;
  const fvgSet=new Set();
  for(let i=1;i<n-1;i++){if(candles[i+1].low>candles[i-1].high||candles[i+1].high<candles[i-1].low)fvgSet.add(i);}
  for(let i=sw;i<n-sw;i++){
    const c=candles[i];
    if(c.close<c.open){
      let imp=0,iCnt=0;
      for(let j=i+1;j<=i+sw;j++){const d=candles[j].close-candles[j].open;if(d>0){imp+=d;iCnt++;}}
      const body=c.open-c.close;
      if(imp>body*1.5){
        const iR=imp/body,bR=body/Math.max(c.high-c.low,.0001);
        let touches=0,mitigated=false;
        for(let j=i+1;j<n;j++){if(candles[j].high>=c.low&&candles[j].low<=c.open)touches++;if(candles[j].low<c.low){mitigated=true;break;}}
        let sc=0;sc+=iR>4?3:iR>2.5?2:1;sc+=bR>0.65?2:bR>0.4?1:0;sc+=iCnt>=2?2:1;sc+=touches===0?3:touches===1?1:0;sc+=fvgSet.has(i)||fvgSet.has(i+1)?2:0;
        const grade=sc>=10?'S':sc>=7?'A':sc>=4?'B':'C';
        obs.push({type:'bull',top:c.open,bottom:c.low,idx:i,sc,grade,touches,mitigated,volume:c.volume,age:n-1-i});
      }
    }
    if(c.close>c.open){
      let imp=0,iCnt=0;
      for(let j=i+1;j<=i+sw;j++){const d=candles[j].open-candles[j].close;if(d>0){imp+=d;iCnt++;}}
      const body=c.close-c.open;
      if(imp>body*1.5){
        const iR=imp/body,bR=body/Math.max(c.high-c.low,.0001);
        let touches=0,mitigated=false;
        for(let j=i+1;j<n;j++){if(candles[j].low<=c.high&&candles[j].high>=c.open)touches++;if(candles[j].high>c.high){mitigated=true;break;}}
        let sc=0;sc+=iR>4?3:iR>2.5?2:1;sc+=bR>0.65?2:bR>0.4?1:0;sc+=iCnt>=2?2:1;sc+=touches===0?3:touches===1?1:0;sc+=fvgSet.has(i)||fvgSet.has(i+1)?2:0;
        const grade=sc>=10?'S':sc>=7?'A':sc>=4?'B':'C';
        obs.push({type:'bear',top:c.high,bottom:c.open,idx:i,sc,grade,touches,mitigated,volume:c.volume,age:n-1-i});
      }
    }
  }
  return{active:obs.filter(o=>!o.mitigated&&o.age<=OB_AGE[o.grade]),flip:obs.filter(o=>o.mitigated&&(o.grade==='S'||o.grade==='A'))};
}

function calcFVG(candles){
  const fvgs=[],n=candles.length;
  for(let i=1;i<n-1;i++){
    const p=candles[i-1],nx=candles[i+1];
    if(nx.low>p.high){const f={type:'bull',top:nx.low,bottom:p.high,mitigated:false,age:n-1-i};for(let j=i+1;j<n;j++){if(candles[j].low<=f.bottom){f.mitigated=true;break;}}fvgs.push(f);}
    if(nx.high<p.low){const f={type:'bear',top:p.low,bottom:nx.high,mitigated:false,age:n-1-i};for(let j=i+1;j<n;j++){if(candles[j].high>=f.top){f.mitigated=true;break;}}fvgs.push(f);}
  }
  return fvgs.filter(f=>!f.mitigated).slice(-16);
}

function calcSwings(candles){
  const sws=[],n=candles.length,lb=5;
  for(let i=lb;i<n-lb;i++){
    const c=candles[i];let isH=true,isL=true;
    for(let j=i-lb;j<=i+lb;j++){if(j===i)continue;if(candles[j].high>=c.high)isH=false;if(candles[j].low<=c.low)isL=false;}
    if(isH)sws.push({type:'high',price:c.high,time:c.time,idx:i});
    if(isL)sws.push({type:'low', price:c.low, time:c.time,idx:i});
  }
  return sws.slice(-30);
}

function calcStructure(candles){
  if(candles.length<12)return{events:[],trend:'neutral',swingHighs:[],swingLows:[]};
  const lb=5,n=candles.length;
  const sHs=[],sLs=[];
  for(let i=lb;i<n-lb;i++){
    const c=candles[i];let isH=true,isL=true;
    for(let j=i-lb;j<=i+lb;j++){if(j===i)continue;if(candles[j].high>=c.high)isH=false;if(candles[j].low<=c.low)isL=false;}
    if(isH)sHs.push({price:c.high,time:c.time,idx:i});
    if(isL)sLs.push({price:c.low, time:c.time,idx:i});
  }
  const events=[];let trend='neutral',lastBH=null,lastBL=null;
  for(let i=lb+1;i<n;i++){
    const c=candles[i];
    const rHs=sHs.filter(h=>h.idx<i-lb),rLs=sLs.filter(l=>l.idx<i-lb);
    if(!rHs.length||!rLs.length)continue;
    const lastH=rHs[rHs.length-1],lastL=rLs[rLs.length-1];
    if(c.close>lastH.price&&lastBH!==lastH){
      const type=trend==='bear'?'CHoCH':'BOS';
      events.push({type,direction:'bull',price:lastH.price,time:c.time,idx:i});
      trend='bull';lastBH=lastH;
    }
    if(c.close<lastL.price&&lastBL!==lastL){
      const type=trend==='bull'?'CHoCH':'BOS';
      events.push({type,direction:'bear',price:lastL.price,time:c.time,idx:i});
      trend='bear';lastBL=lastL;
    }
  }
  return{events:events.slice(-25),trend,swingHighs:sHs.slice(-10),swingLows:sLs.slice(-10)};
}

function calcHTFBias(c1h,c4h){
  const getBias=(candles)=>{
    if(!candles.length)return'neutral';
    const s=calcStructure(candles);
    if(!s.events.length)return'neutral';
    const lastC=s.events.filter(e=>e.type==='CHoCH').slice(-1)[0];
    if(lastC)return lastC.direction;
    const rec=s.events.slice(-5),b=rec.filter(e=>e.direction==='bull').length,be=rec.filter(e=>e.direction==='bear').length;
    return b>be?'bull':be>b?'bear':'neutral';
  };
  return{h1:getBias(c1h),h4:getBias(c4h)};
}

function calcLiquidity(candles){
  const lb=5,n=candles.length,tol=0.0015;
  const sHs=[],sLs=[];
  for(let i=lb;i<n-lb;i++){
    const c=candles[i];let isH=true,isL=true;
    for(let j=i-lb;j<=i+lb;j++){if(j===i)continue;if(candles[j].high>=c.high)isH=false;if(candles[j].low<=c.low)isL=false;}
    if(isH)sHs.push({price:c.high,time:c.time,idx:i});
    if(isL)sLs.push({price:c.low, time:c.time,idx:i});
  }
  const pools=[];
  for(let i=0;i<sHs.length-1;i++)for(let j=i+1;j<sHs.length;j++){
    if(Math.abs(sHs[i].price-sHs[j].price)/sHs[i].price<tol){
      const p=(sHs[i].price+sHs[j].price)/2;
      const taken=candles.slice(sHs[j].idx+1).some(c=>c.high>p*(1+tol*2));
      pools.push({type:'BSL',price:p,time:sHs[j].time,idx:sHs[j].idx,taken,count:2});break;
    }
  }
  for(let i=0;i<sLs.length-1;i++)for(let j=i+1;j<sLs.length;j++){
    if(Math.abs(sLs[i].price-sLs[j].price)/sLs[i].price<tol){
      const p=(sLs[i].price+sLs[j].price)/2;
      const taken=candles.slice(sLs[j].idx+1).some(c=>c.low<p*(1-tol*2));
      pools.push({type:'SSL',price:p,time:sLs[j].time,idx:sLs[j].idx,taken,count:2});break;
    }
  }
  if(sHs.length){const sh=sHs[sHs.length-1];pools.push({type:'BSL',price:sh.price,time:sh.time,idx:sh.idx,taken:candles.slice(sh.idx+1).some(c=>c.high>sh.price),count:1});}
  if(sLs.length){const sl=sLs[sLs.length-1];pools.push({type:'SSL',price:sl.price,time:sl.time,idx:sl.idx,taken:candles.slice(sl.idx+1).some(c=>c.low<sl.price),count:1});}
  const deduped=[];
  for(const p of pools)if(!deduped.some(d=>Math.abs(d.price-p.price)/p.price<tol*2))deduped.push(p);
  return deduped.sort((a,b)=>b.price-a.price);
}

function calcSessions(candles,sessType){
  const sessions={};
  const now=Math.floor(Date.now()/1000);
  const todayJST=Math.floor((now+9*3600)/86400)*86400-9*3600;
  const prevStart=todayJST-86400,prevEnd=todayJST;
  const prev=candles.filter(c=>c.time>=prevStart&&c.time<prevEnd);
  if(prev.length){sessions.pdh=Math.max(...prev.map(c=>c.high));sessions.pdl=Math.min(...prev.map(c=>c.low));sessions.pdc=prev[prev.length-1].close;}
  const asiaS=todayJST,asiaE=todayJST+9*3600;
  const asia=candles.filter(c=>c.time>=asiaS&&c.time<asiaE);
  if(asia.length){sessions.asiaH=Math.max(...asia.map(c=>c.high));sessions.asiaL=Math.min(...asia.map(c=>c.low));}
  const lonS=todayJST+16*3600,lonE=lonS+9*3600;
  const lon=candles.filter(c=>c.time>=lonS&&c.time<lonE);
  if(lon.length){sessions.lonH=Math.max(...lon.map(c=>c.high));sessions.lonL=Math.min(...lon.map(c=>c.low));}
  const nyS=todayJST+22*3600+1800,nyE=nyS+7*3600;
  const ny=candles.filter(c=>c.time>=nyS&&c.time<nyE);
  if(ny.length){sessions.nyH=Math.max(...ny.map(c=>c.high));sessions.nyL=Math.min(...ny.map(c=>c.low));}
  return sessions;
}

function calcPD(candles){
  if(candles.length<5)return{ratio:.5,zone:'EQ',hi:0,lo:0,range:0};
  const recent=candles.slice(-50);
  const hi=Math.max(...recent.map(c=>c.high)),lo=Math.min(...recent.map(c=>c.low));
  const range=hi-lo;if(!range)return{ratio:.5,zone:'EQ',hi,lo,range:0};
  const cur=candles[candles.length-1].close;
  const ratio=(cur-lo)/range;
  const zone=ratio>0.62?'PREMIUM':ratio<0.38?'DISCOUNT':'EQ';
  const inOTE=(zone==='PREMIUM'&&ratio>0.62&&ratio<0.79)||(zone==='DISCOUNT'&&ratio>0.21&&ratio<0.38);
  return{ratio,zone,inOTE,hi,lo,range};
}

function calcATR(candles,p=14){
  if(candles.length<p+1)return candles.length>1?candles[candles.length-1].high-candles[candles.length-1].low:1;
  let s=0;
  for(let i=candles.length-p;i<candles.length;i++){
    const c=candles[i],pr=candles[i-1];
    s+=Math.max(c.high-c.low,Math.abs(c.high-pr.close),Math.abs(c.low-pr.close));
  }
  return s/p;
}

function calcScore(instId){
  const s=VS[instId];if(!s.candles.length)return{total:0,bd:{}};
  const cur=s.candles[s.candles.length-1].close;
  const bd={};let total=0;
  const h1=s.htfBias.h1,h4=s.htfBias.h4;
  const htfDir=h1==='bull'&&h4==='bull'?'bull':h1==='bear'&&h4==='bear'?'bear':h1!=='neutral'?h1:h4!=='neutral'?h4:'neutral';
  const htfPts=h1!=='neutral'&&h4!=='neutral'&&h1===h4?30:h1!=='neutral'||h4!=='neutral'?12:0;
  bd.htf={pts:htfPts,max:30,lbl:'HTF'};total+=htfPts;
  const recentE=s.structure.events.slice(-8);
  const lastE=recentE.slice(-1)[0];
  const structAligned=lastE&&lastE.direction===htfDir;
  const structPts=!lastE?0:lastE.type==='CHoCH'&&structAligned?20:lastE.type==='BOS'&&structAligned?12:5;
  bd.struct={pts:structPts,max:20,lbl:'STRUCT'};total+=structPts;
  const pd=s.pd;
  const pdAligned=(htfDir==='bull'&&pd.zone==='DISCOUNT')||(htfDir==='bear'&&pd.zone==='PREMIUM');
  const pdPts=pd.inOTE&&pdAligned?15:pdAligned?8:pd.zone==='EQ'?3:0;
  bd.pd={pts:pdPts,max:15,lbl:'P/D'};total+=pdPts;
  const freshLiq=s.liquidity.filter(l=>!l.taken);
  const recentC=s.candles.slice(-10);
  const swept=freshLiq.filter(l=>{
    if(l.type==='BSL'&&htfDir==='bear')return recentC.some(c=>c.high>=l.price);
    if(l.type==='SSL'&&htfDir==='bull')return recentC.some(c=>c.low<=l.price);
    return false;
  });
  const liqPts=swept.length>=2?20:swept.length===1?12:0;
  bd.liq={pts:liqPts,max:20,lbl:'LIQ'};total+=liqPts;
  const obs=calcOB(s.candles),fvgs=calcFVG(s.candles);
  const nearPct=0.007;
  const nearOBs=(obs.active||[]).filter(ob=>{const mid=(ob.top+ob.bottom)/2;return Math.abs(mid-cur)/cur<nearPct&&ob.type===(htfDir==='bull'?'bull':'bear');});
  const nearFVGs=fvgs.filter(fvg=>{const mid=(fvg.top+fvg.bottom)/2;return Math.abs(mid-cur)/cur<nearPct;});
  const hasHighOB=nearOBs.some(o=>o.grade==='S'||o.grade==='A');
  const obfvgPts=hasHighOB&&nearFVGs.length?15:hasHighOB?10:nearOBs.length&&nearFVGs.length?8:nearFVGs.length?4:0;
  bd.obfvg={pts:obfvgPts,max:15,lbl:'OB+FVG'};total+=obfvgPts;
  return{total:Math.min(total,100),bd,htfDir,obs,fvgs};
}

function genEntry(scoreRes,instId){
  const{total,htfDir,obs,fvgs}=scoreRes;
  if(total<45||htfDir==='neutral')return null;
  const s=VS[instId],cfg=INST[instId];if(!s.candles.length)return null;
  const cur=s.candles[s.candles.length-1].close,atr=s.atr,dp=cfg.dp;
  const dirOBs=(obs.active||[]).filter(ob=>ob.type===(htfDir==='bull'?'bull':'bear'));
  const nearOB=dirOBs.sort((a,b)=>Math.abs((a.top+a.bottom)/2-cur)-Math.abs((b.top+b.bottom)/2-cur))[0];
  let entry,sl;
  if(htfDir==='bear'){
    entry=nearOB?nearOB.bottom:cur;sl=nearOB?nearOB.top+atr*.25:cur+atr*1.5;
    const bOBs=(obs.active||[]).filter(o=>o.type==='bull'&&o.top<entry).sort((a,b)=>b.top-a.top);
    const tp1=bOBs.length?bOBs[0].top:entry-atr*2;const tp2=bOBs.length>1?bOBs[1].top:entry-atr*4;
    const risk=Math.abs(entry-sl);
    return{dir:'bear',entry,sl,tp1,tp2,risk,rr1:(Math.abs(entry-tp1)/risk).toFixed(1),rr2:(Math.abs(entry-tp2)/risk).toFixed(1),score:total,grade:total>=80?'A':total>=60?'B':total>=45?'C':'D'};
  }else{
    entry=nearOB?nearOB.top:cur;sl=nearOB?nearOB.bottom-atr*.25:cur-atr*1.5;
    const beOBs=(obs.active||[]).filter(o=>o.type==='bear'&&o.bottom>entry).sort((a,b)=>a.bottom-b.bottom);
    const tp1=beOBs.length?beOBs[0].bottom:entry+atr*2;const tp2=beOBs.length>1?beOBs[1].bottom:entry+atr*4;
    const risk=Math.abs(entry-sl);
    return{dir:'bull',entry,sl,tp1,tp2,risk,rr1:(Math.abs(tp1-entry)/risk).toFixed(1),rr2:(Math.abs(tp2-entry)/risk).toFixed(1),score:total,grade:total>=80?'A':total>=60?'B':total>=45?'C':'D'};
  }
}

function getKZ(sessType){
  const now=new Date();
  const jstH=(now.getUTCHours()+9)%24,jstM=now.getUTCMinutes(),jstT=jstH*60+jstM;
  const kzs=sessType==='equity'?[
    {s:0,e:30,n:'TOKYO PRE',c:'var(--gold)'},
    {s:30,e:180,n:'TOKYO AM',c:'var(--up)',active:true},
    {s:180,e:210,n:'LUNCH'},
    {s:210,e:360,n:'TOKYO PM',c:'var(--up)',active:true},
  ]:[
    {s:0,e:60,n:'TOKYO OPEN',c:'var(--gold)',active:true},
    {s:480,e:540,n:'TK/LN OVERLAP',c:jstT>=480&&jstT<540?'var(--up)':undefined,active:true},
    {s:960,e:1020,n:'NY OPEN',c:'#F7931A',active:true},
    {s:1560,e:1620,n:'LONDON OPEN',c:'#48C8E8',active:true},
  ];
  for(const k of kzs){if(jstT>=k.s&&jstT<k.e)return{name:k.n,active:k.active||false,color:k.c||'var(--txt-d)'};}
  const next=kzs.find(k=>k.s>jstT)||kzs[0];
  const diff=(next.s>jstT?next.s-jstT:next.s+1440-jstT);
  return{name:`NEXT: ${next.n} ${Math.floor(diff/60)}h${diff%60}m`,active:false,color:'var(--txt-d)'};
}

function initChart(){
  const el=document.getElementById('vLw');
  if(chart){chart.remove();chart=null;cSeries=null;volSeries=null;}
  if(_resizeObs){_resizeObs.disconnect();_resizeObs=null;}
  chart=LightweightCharts.createChart(el,{
    width:el.offsetWidth,height:el.offsetHeight,
    layout:{background:{type:'solid',color:'#060504'},textColor:'#5A4E24',fontFamily:"'JetBrains Mono',monospace",fontSize:10},
    grid:{vertLines:{color:'#080705'},horzLines:{color:'#080705'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal,vertLine:{color:'#3D2A08',labelBackgroundColor:'#130F07'},horzLine:{color:'#3D2A08',labelBackgroundColor:'#130F07'}},
    rightPriceScale:{borderColor:'#1E1708',textColor:'#5A4E24',scaleMargins:{top:.06,bottom:.20}},
    timeScale:{borderColor:'#1E1708',timeVisible:true,secondsVisible:false},
  });
  cSeries=chart.addCandlestickSeries({upColor:'#3DAA62',downColor:'#C44040',borderUpColor:'#3DAA62',borderDownColor:'#C44040',wickUpColor:'#3DAA62',wickDownColor:'#C44040'});
  volSeries=chart.addHistogramSeries({color:'#1E1708',priceFormat:{type:'volume'},priceScaleId:'vol'});
  chart.priceScale('vol').applyOptions({scaleMargins:{top:.82,bottom:0}});

  if(_panelTimer)clearInterval(_panelTimer);
  _panelTimer=setInterval(()=>{requestAnimationFrame(draw);updatePanel();},130);
  _resizeObs=new ResizeObserver(()=>{
    const a=document.getElementById('chartArea');

  });

}

function resizeCvs(){const a=document.getElementById('chartArea'),c=document.getElementById('vCvs');c.width=a.offsetWidth;c.height=a.offsetHeight;}
function getPaneOY(){const cvs=document.querySelectorAll('#vLw canvas');if(!cvs.length)return 0;return Math.round(cvs[0].getBoundingClientRect().top-document.getElementById('chartArea').getBoundingClientRect().top);}
function p2y(price){return cSeries?cSeries.priceToCoordinate(price):null;}

async function loadData(instId){
  instId=instId||currentInst;
  const s=VS[instId],cfg=INST[instId];
  if(instId===currentInst){showOv(true,'データ取得中 ('+cfg.name+' '+currentTF+')...');}
  try{
    // Fetch main + HTF candles
    let htfTf1h='1h',htfTf4h='4h';
    const [main,c1h,c4h]=await Promise.all([
      fetchCandles(instId,currentTF),
      fetchCandles(instId,htfTf1h,300),
      fetchCandles(instId,htfTf4h,200),
    ]);
    s.candles=main;s.c1h=c1h;s.c4h=c4h;
    // Recalc all derived data
    recalc(instId);
    if(instId===currentInst&&cSeries){
      cSeries.setData(main.map(c=>({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close})));
      volSeries.setData(main.map(c=>({time:c.time,value:c.volume,color:c.close>=c.open?'rgba(61,170,98,.25)':'rgba(196,64,64,.25)'})));
      chart.priceScale('right').applyOptions({autoScale:true});
      chart.timeScale().fitContent();
      const show=SHOW_B[currentTF]||80;
      chart.timeScale().setVisibleLogicalRange({from:Math.max(0,main.length-show-2),to:main.length+2});
      s.isFirstLoad=false;
      updateMarkers();
      const last=main[main.length-1],prev=main[main.length-2]||last;
      const da=last.close-prev.close,dp=(da/prev.close*100).toFixed(2);
      document.getElementById('pMain').textContent=last.close.toFixed(cfg.dp);
      const el=document.getElementById('pChg');el.textContent=(da>=0?'+':'')+da.toFixed(cfg.dp)+' ('+dp+'%)';el.className='price-chg '+(da>=0?'up-bg':'dn-bg');
      document.getElementById('stHigh').textContent=' '+Math.max(...main.map(c=>c.high)).toFixed(cfg.dp);
      document.getElementById('stLow').textContent =' '+Math.min(...main.map(c=>c.low)).toFixed(cfg.dp);
      document.getElementById('stSrc').textContent =' '+cfg.src.toUpperCase();
      document.getElementById('vStatusMsg').textContent=main.length+'本 | 1H:'+c1h.length+' 4H:'+c4h.length;
      showOv(false);
      requestAnimationFrame(draw);
    }
  }catch(e){
    if(instId===currentInst)showOv(true,'取得失敗:\n'+e.message,true);
  }
}

function recalc(instId){
  const s=VS[instId];
  s.structure=calcStructure(s.candles);
  s.htfBias=calcHTFBias(s.c1h,s.c4h);
  s.liquidity=calcLiquidity(s.candles);
  s.sessions=calcSessions(s.candles,INST[instId].sessType);
  s.pd=calcPD(s.candles);
  s.atr=calcATR(s.candles);
  const sr=calcScore(instId);
  s.score=sr.total;s.bd=sr.bd;s.entry=genEntry(sr,instId);
}

function updateMarkers(){
  const s=VS[currentInst];if(!cSeries||!s.candles.length)return;
  const markers=s.structure.events.slice(-15).map(e=>({
    time:e.time,position:e.direction==='bull'?'belowBar':'aboveBar',
    color:e.type==='CHoCH'?(e.direction==='bull'?'#3DAA62':'#C44040'):(e.direction==='bull'?'rgba(100,200,100,.8)':'rgba(200,100,100,.8)'),
    shape:e.direction==='bull'?'arrowUp':'arrowDown',text:e.type,size:e.type==='CHoCH'?2:1,
  }));
  try{cSeries.setMarkers(markers.sort((a,b)=>a.time-b.time));}catch(e){}
  document.getElementById('stATR').textContent=' '+VS[currentInst].atr.toFixed(INST[currentInst].dp);
}

function switchInst(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  if(btn)btn.classList.add('on');
  const prev=currentInst;currentInst=id;
  const cfg=INST[id];
  const symEl=document.getElementById('symLabel');symEl.textContent=cfg.name;symEl.className='sym '+cfg.cls;
  document.getElementById('pMain').style.color=cfg.accent;
  document.getElementById('vCvs').getContext('2d').clearRect(0,0,9999,9999);
  const s=VS[id];
  if(s.candles.length&&!s.isFirstLoad){
    cSeries.setData(s.candles.map(c=>({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close})));
    volSeries.setData(s.candles.map(c=>({time:c.time,value:c.volume,color:c.close>=c.open?'rgba(61,170,98,.25)':'rgba(196,64,64,.25)'})));
    chart.priceScale('right').applyOptions({autoScale:true});
    chart.timeScale().fitContent();
    chart.timeScale().setVisibleLogicalRange({from:Math.max(0,s.candles.length-SHOW_B[currentTF]-2),to:s.candles.length+2});
    const last=s.candles[s.candles.length-1],p2=s.candles[s.candles.length-2]||last,da=last.close-p2.close;
    document.getElementById('pMain').textContent=last.close.toFixed(cfg.dp);
    const el=document.getElementById('pChg');el.textContent=(da>=0?'+':'')+da.toFixed(cfg.dp)+' ('+(da/p2.close*100).toFixed(2)+'%)';el.className='price-chg '+(da>=0?'up-bg':'dn-bg');
    document.getElementById('stHigh').textContent=' '+Math.max(...s.candles.map(c=>c.high)).toFixed(cfg.dp);
    document.getElementById('stLow').textContent =' '+Math.min(...s.candles.map(c=>c.low)).toFixed(cfg.dp);
    document.getElementById('stSrc').textContent =' '+cfg.src.toUpperCase();
    updateMarkers();requestAnimationFrame(draw);
  }else{
    document.getElementById('pMain').textContent='—';document.getElementById('pChg').textContent='—';
    loadData(id).then(()=>connectRT(id));return;
  }
  if(id!==prev)connectRT(id);
}

function setTF(tf,btn){
  currentTF=tf;document.querySelectorAll('.tfrow .tf').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');
  stopRT(currentInst);VS[currentInst].isFirstLoad=true;VS[currentInst].wsFailCount=0;
  loadData(currentInst).then(()=>connectRT(currentInst));
}
function reload(){
  stopRT(currentInst);VS[currentInst].wsFailCount=0;
  loadData(currentInst).then(()=>connectRT(currentInst));
}
function tog(l,btn){
  if(l==='BOS')showBOS=!showBOS;else if(l==='FVG')showFVG=!showFVG;else if(l==='LIQ')showLIQ=!showLIQ;else showSES=!showSES;
  btn.classList.toggle('on',l==='BOS'?showBOS:l==='FVG'?showFVG:l==='LIQ'?showLIQ:showSES);
  requestAnimationFrame(draw);
}

// ═══════════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════════
function draw(){
  const cvs=document.getElementById('vCvs'),ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,cvs.width,cvs.height);
  if(!cSeries)return;
  _phase=(_phase+.04)%(Math.PI*2);
  const pOY=getPaneOY();ctx.save();ctx.translate(0,pOY);
  const W=cvs.width,s=VS[currentInst],cfg=INST[currentInst];
  if(!s.candles.length){ctx.restore();return;}
  const vp=calcVP(s.candles);

  // ── VP ──
  if(vp.buckets.length){
    const maxW=W*.15;
    for(const b of vp.buckets){const y0=p2y(b.priceTo),y1=p2y(b.priceFrom);if(y0==null||y1==null)continue;ctx.fillStyle=b.isPOC?'rgba(232,184,75,.55)':b.inVA?'rgba(80,120,80,.20)':'rgba(60,50,20,.22)';ctx.fillRect(0,y0,b.ratio*maxW,Math.max(1,y1-y0));}
    for(const[v,c,d]of[[vp.poc,'rgba(232,184,75,.80)',[4,4]],[vp.vah,'rgba(90,143,106,.60)',[3,6]],[vp.val,'rgba(143,90,90,.60)',[3,6]]]){
      if(v==null)continue;const y=p2y(v);if(y==null)continue;ctx.strokeStyle=c;ctx.lineWidth=1;ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W*.82,y);ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // ── Session levels ──
  if(showSES){
    const ses=s.sessions;
    const lvls=[[ses.pdh,'rgba(232,184,75,.65)',[6,4],'PDH'],[ses.pdl,'rgba(232,184,75,.65)',[6,4],'PDL'],[ses.pdc,'rgba(90,78,36,.60)',[2,5],'PDC'],[ses.asiaH,'rgba(80,120,200,.50)',[3,5],'AsiaH'],[ses.asiaL,'rgba(80,120,200,.50)',[3,5],'AsiaL'],[ses.lonH,'rgba(80,160,120,.45)',[3,5],'LonH'],[ses.lonL,'rgba(80,160,120,.45)',[3,5],'LonL']];
    for(const[v,c,d,lbl]of lvls){if(v==null)continue;const y=p2y(v);if(y==null)continue;ctx.strokeStyle=c;ctx.lineWidth=1;ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(W*.15,y);ctx.lineTo(W*.88,y);ctx.stroke();ctx.setLineDash([]);ctx.font='8px JetBrains Mono,monospace';ctx.fillStyle=c;ctx.fillText(lbl,W*.15+3,y-2);}
  }

  // ── OTE zones ──
  const pd=s.pd;
  if(pd.range>0){
    const yHi=p2y(pd.hi),yLo=p2y(pd.lo);
    if(yHi!=null&&yLo!=null){
      const yOTs=p2y(pd.lo+pd.range*.79),yOTsB=p2y(pd.lo+pd.range*.62);
      const yOTb=p2y(pd.lo+pd.range*.38),yOTbB=p2y(pd.lo+pd.range*.21);
      if(yOTs!=null&&yOTsB!=null){ctx.fillStyle='rgba(196,64,64,.055)';ctx.fillRect(W*.15,yOTs,W*.73,yOTsB-yOTs);ctx.strokeStyle='rgba(196,64,64,.20)';ctx.lineWidth=.7;ctx.setLineDash([2,4]);ctx.strokeRect(W*.15,yOTs,W*.73,yOTsB-yOTs);ctx.setLineDash([]);ctx.font='8px JetBrains Mono,monospace';ctx.fillStyle='rgba(196,64,64,.45)';ctx.fillText('OTE▼',W*.15+3,yOTs+10);}
      if(yOTb!=null&&yOTbB!=null){ctx.fillStyle='rgba(61,170,98,.055)';ctx.fillRect(W*.15,yOTb,W*.73,yOTbB-yOTb);ctx.strokeStyle='rgba(61,170,98,.20)';ctx.lineWidth=.7;ctx.setLineDash([2,4]);ctx.strokeRect(W*.15,yOTb,W*.73,yOTbB-yOTb);ctx.setLineDash([]);ctx.font='8px JetBrains Mono,monospace';ctx.fillStyle='rgba(61,170,98,.45)';ctx.fillText('OTE▲',W*.15+3,yOTb-2);}
      const yEQ=p2y(pd.lo+pd.range*.5);if(yEQ!=null){ctx.strokeStyle='rgba(90,78,36,.35)';ctx.lineWidth=.8;ctx.setLineDash([1,6]);ctx.beginPath();ctx.moveTo(W*.15,yEQ);ctx.lineTo(W*.90,yEQ);ctx.stroke();ctx.setLineDash([]);ctx.font='8px JetBrains Mono,monospace';ctx.fillStyle='rgba(90,78,36,.50)';ctx.textAlign='right';ctx.fillText('EQ',W*.90,yEQ-2);ctx.textAlign='left';}
    }
  }

  // ── S/A OBs only on chart ──
  const obsD=calcOB(s.candles);
  const GRADE={S:{fill:.16,stroke:.90,lw:2},A:{fill:.11,stroke:.70,lw:1.5}};
  for(const ob of(obsD.active||[])){
    if(ob.grade!=='S'&&ob.grade!=='A')continue;
    const yt=p2y(ob.top),yb=p2y(ob.bottom);if(yt==null||yb==null)continue;
    const h=Math.max(2,yb-yt),st=GRADE[ob.grade];
    const[r,g,b]=ob.type==='bull'?[100,160,255]:[255,100,100];
    ctx.fillStyle=`rgba(${r},${g},${b},${st.fill})`;ctx.strokeStyle=`rgba(${r},${g},${b},${st.stroke})`;
    ctx.lineWidth=st.lw;ctx.setLineDash([]);ctx.fillRect(W*.15,yt,W*.73,h);ctx.strokeRect(W*.15,yt,W*.73,h);
    ctx.fillStyle=`rgba(${r},${g},${b},${ob.grade==='S'?1:.80})`;ctx.fillRect(W*.15,yt,4,h);
  }
  for(const ob of(obsD.flip||[])){
    const yt=p2y(ob.top),yb=p2y(ob.bottom);if(yt==null||yb==null)continue;
    const h=Math.max(1,yb-yt);const[r,g,b]=ob.type==='bull'?[100,160,255]:[255,100,100];
    ctx.fillStyle=`rgba(${r},${g},${b},.03)`;ctx.strokeStyle=`rgba(${r},${g},${b},.16)`;ctx.lineWidth=.6;ctx.setLineDash([3,7]);ctx.fillRect(W*.15,yt,W*.73,h);ctx.strokeRect(W*.15,yt,W*.73,h);ctx.setLineDash([]);
  }

  // ── FVG ──
  if(showFVG){
    const fvgsD=calcFVG(s.candles);
    for(const fvg of fvgsD){
      const yt=p2y(fvg.top),yb=p2y(fvg.bottom);if(yt==null||yb==null)continue;
      const h=Math.max(2,yb-yt);const[r,g,b]=fvg.type==='bull'?[100,220,160]:[220,100,100];
      ctx.fillStyle=`rgba(${r},${g},${b},.08)`;ctx.strokeStyle=`rgba(${r},${g},${b},.28)`;ctx.lineWidth=.8;ctx.setLineDash([2,4]);ctx.fillRect(W*.15,yt,W*.73,h);ctx.strokeRect(W*.15,yt,W*.73,h);ctx.setLineDash([]);
    }
  }

  // ── Liquidity pools ──
  if(showLIQ){
    for(const l of s.liquidity.filter(l=>!l.taken)){
      const y=p2y(l.price);if(y==null)continue;
      const isBSL=l.type==='BSL',c=isBSL?'rgba(232,184,75,.72)':'rgba(180,120,220,.72)';
      ctx.strokeStyle=c;ctx.lineWidth=.9;ctx.setLineDash([1,3]);ctx.beginPath();ctx.moveTo(W*.15,y);ctx.lineTo(W*.90,y);ctx.stroke();ctx.setLineDash([]);
      ctx.font=l.count>1?'bold 8px JetBrains Mono,monospace':'8px JetBrains Mono,monospace';ctx.fillStyle=c;ctx.textAlign='right';ctx.fillText(l.type+(l.count>1?'×'+l.count:''),W*.92,y+3);ctx.textAlign='left';
    }
  }

  // ── BOS/CHoCH break lines ──
  if(showBOS){
    for(const e of s.structure.events.slice(-8)){
      const y=p2y(e.price);if(y==null)continue;
      const isC=e.type==='CHoCH',isBull=e.direction==='bull';
      ctx.strokeStyle=isC?(isBull?'rgba(61,170,98,.50)':'rgba(196,64,64,.50)'):(isBull?'rgba(100,180,100,.30)':'rgba(180,100,100,.30)');
      ctx.lineWidth=isC?1:.7;ctx.setLineDash(isC?[4,3]:[2,5]);ctx.beginPath();ctx.moveTo(W*.15,y);ctx.lineTo(W*.90,y);ctx.stroke();ctx.setLineDash([]);
    }
  }

  // ── Entry arrow + levels ──
  const entry=s.entry;
  if(entry&&entry.score>=55){
    const blink=.55+.45*Math.sin(_phase);
    const y=p2y(entry.entry);
    if(y!=null){
      const isBull=entry.dir==='bull';const[r,g,b]=isBull?[61,170,98]:[196,64,64];
      const AX=W*.86,sz=12;
      ctx.save();ctx.globalAlpha=blink;ctx.fillStyle=`rgba(${r},${g},${b},1)`;ctx.strokeStyle=`rgba(${r},${g},${b},1)`;ctx.lineWidth=1.5;
      ctx.beginPath();
      if(isBull){ctx.moveTo(AX,y-sz);ctx.lineTo(AX+sz*.7,y+sz*.6);ctx.lineTo(AX-sz*.7,y+sz*.6);}
      else{ctx.moveTo(AX,y+sz);ctx.lineTo(AX+sz*.7,y-sz*.6);ctx.lineTo(AX-sz*.7,y-sz*.6);}
      ctx.closePath();ctx.fill();ctx.stroke();
      ctx.globalAlpha=blink*.3;ctx.fillStyle=`rgba(${r},${g},${b},.3)`;
      ctx.beginPath();
      if(isBull){ctx.moveTo(AX,y-sz-5);ctx.lineTo(AX+sz+4,y+sz*.6+4);ctx.lineTo(AX-sz-4,y+sz*.6+4);}
      else{ctx.moveTo(AX,y+sz+5);ctx.lineTo(AX+sz+4,y-sz*.6-4);ctx.lineTo(AX-sz-4,y-sz*.6-4);}
      ctx.closePath();ctx.fill();ctx.restore();
      // Lines
      const ySL=p2y(entry.sl),yTP1=p2y(entry.tp1),yTP2=p2y(entry.tp2);
      if(ySL!=null){ctx.save();ctx.globalAlpha=.45;ctx.strokeStyle='rgba(196,64,64,.65)';ctx.lineWidth=.9;ctx.setLineDash([3,4]);ctx.beginPath();ctx.moveTo(W*.15,ySL);ctx.lineTo(W*.92,ySL);ctx.stroke();ctx.setLineDash([]);ctx.font='8px JetBrains Mono,monospace';ctx.fillStyle='rgba(196,64,64,.60)';ctx.textAlign='right';ctx.fillText('SL '+entry.sl.toFixed(INST[currentInst].dp),W*.92,ySL-2);ctx.textAlign='left';ctx.restore();}
      if(yTP1!=null){ctx.save();ctx.globalAlpha=.45;ctx.strokeStyle='rgba(61,170,98,.65)';ctx.lineWidth=.9;ctx.setLineDash([3,4]);ctx.beginPath();ctx.moveTo(W*.15,yTP1);ctx.lineTo(W*.92,yTP1);ctx.stroke();ctx.setLineDash([]);ctx.font='8px JetBrains Mono,monospace';ctx.fillStyle='rgba(61,170,98,.60)';ctx.textAlign='right';ctx.fillText('TP1 ×'+entry.rr1+'R',W*.92,yTP1-2);ctx.textAlign='left';ctx.restore();}
      if(yTP2!=null){ctx.save();ctx.globalAlpha=.35;ctx.strokeStyle='rgba(61,170,98,.55)';ctx.lineWidth=.7;ctx.setLineDash([2,5]);ctx.beginPath();ctx.moveTo(W*.15,yTP2);ctx.lineTo(W*.92,yTP2);ctx.stroke();ctx.setLineDash([]);ctx.font='8px JetBrains Mono,monospace';ctx.fillStyle='rgba(61,170,98,.50)';ctx.textAlign='right';ctx.fillText('TP2 ×'+entry.rr2+'R',W*.92,yTP2-2);ctx.textAlign='left';ctx.restore();}
      // Entry line
      ctx.save();ctx.globalAlpha=blink*.55;ctx.strokeStyle=`rgba(${r},${g},${b},.70)`;ctx.lineWidth=1;ctx.setLineDash([5,3]);ctx.beginPath();ctx.moveTo(W*.15,y);ctx.lineTo(AX-sz-3,y);ctx.stroke();ctx.setLineDash([]);ctx.restore();
    }
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  PANEL UPDATE
// ═══════════════════════════════════════════════════════════
let _prevHash='';
function updatePanel(){
  if(!cSeries)return;
  const s=VS[currentInst];if(!s.candles.length)return;
  const cfg=INST[currentInst],dp=cfg.dp;
  const cur=s.candles[s.candles.length-1].close;
  // Hash check
  const hash=[s.score,s.htfBias.h1,s.htfBias.h4,s.pd.zone,cur.toFixed(dp)].join('|');
  if(hash===_prevHash)return;_prevHash=hash;
  // Recalc on panel update
  recalc(currentInst);

  // HTF Bias
  const bm={'bull':['▲ BULL','vb-bull'],'bear':['▼ BEAR','vb-bear'],'neutral':['— NEU','vb-neu']};
  const[h1t,h1c]=bm[s.htfBias.h1],el1=document.getElementById('vBias1h');el1.textContent=h1t;el1.className='bi-val '+h1c;
  const[h4t,h4c]=bm[s.htfBias.h4],el4=document.getElementById('vBias4h');el4.textContent=h4t;el4.className='bi-val '+h4c;
  const stEl=document.getElementById('vBiasStruct');
  const lastE=s.structure.events.slice(-1)[0];
  if(lastE){stEl.textContent=lastE.type;stEl.className='bi-val '+(lastE.direction==='bull'?'vb-bull':'vb-bear');}
  else{stEl.textContent='—';stEl.className='bi-val vb-neu';}

  // P/D meter
  const pct=Math.round(s.pd.ratio*100);
  const pdCur=document.getElementById('vPDCur');pdCur.style.left=pct+'%';
  pdCur.style.background=s.pd.zone==='PREMIUM'?'#C44040':s.pd.zone==='DISCOUNT'?'#3DAA62':'var(--txt-d)';

  // KZ
  const kz=getKZ(cfg.sessType);const kzEl=document.getElementById('vKZ');
  kzEl.textContent=kz.name;kzEl.style.color=kz.active?'var(--gold)':'var(--txt-d)';
  document.getElementById('vKZNext').textContent=s.pd.zone;

  // Score
  const sc=s.score,scEl=document.getElementById('vScoreNum'),scBar=document.getElementById('vScoreBar');
  scEl.textContent=sc;const scC=sc>=80?'#3DAA62':sc>=60?'var(--gold)':sc>=45?'var(--txt-d)':'#C44040';
  scEl.style.color=scC;scBar.style.width=sc+'%';scBar.style.background=scC;

  // OB count
  const obsD=calcOB(s.candles);document.getElementById('stOB').textContent=' '+(obsD.active?.length||0)+'件';

  // Session badge
  const sb=document.getElementById('sessBadge');sb.textContent=kz.name;sb.style.color=kz.active?'var(--gold)':'var(--txt-d)';sb.style.borderColor=kz.active?'rgba(201,147,42,.4)':'var(--border)';

  // Liquidity panel
  const liqEl=document.getElementById('liqPanel');
  const fresh=s.liquidity.filter(l=>!l.taken).sort((a,b)=>b.price-a.price);
  if(!fresh.length){liqEl.innerHTML='<div class="lp-empty">なし</div>';}
  else{liqEl.innerHTML=fresh.map(l=>{
    const isBSL=l.type==='BSL',c=isBSL?'rgba(232,184,75,.85)':'rgba(180,120,220,.85)';
    const dist=((l.price-cur)/cur*100).toFixed(2);
    const bg=Math.abs(l.price-cur)/cur<0.003?'background:rgba(90,78,36,.10);':'';
    return`<div class="lp-row" style="${bg}"><span class="lp-type" style="color:${c}">${l.type}${l.count>1?'×'+l.count:''}</span><span class="lp-price" style="color:${c}">${l.price.toFixed(dp)}</span><span class="lp-dist">${dist>0?'+':''}${dist}%</span></div>`;
  }).join('');}

  // Entry card
  const ec=document.getElementById('entryCard');const e=s.entry;
  if(!e){ec.innerHTML=`<div class="ec-none">スコア不足 (${s.score}/100) — エントリー候補なし</div>`;return;}
  const isBull=e.dir==='bull',dirC=isBull?'#3DAA62':'#C44040',dirLbl=isBull?'▲ LONG':'▼ SHORT';
  const gcls=e.grade==='A'?'ec-ga':e.grade==='B'?'ec-gb':e.grade==='C'?'ec-gc':'ec-gd';
  const bdItems=Object.values(s.bd);
  ec.innerHTML=`<div class="ec-inner">
    <div class="ec-main">
      <div class="ec-head"><div class="ec-dir" style="color:${dirC}">${dirLbl}</div><div class="ec-grade ${gcls}">GRADE ${e.grade} ${e.score}/100</div></div>
      <div class="ec-levels">
        <div class="ec-lv"><div class="ec-lv-lbl">ENTRY</div><div class="ec-lv-val" style="color:${dirC}">${e.entry.toFixed(dp)}</div></div>
        <div class="ec-lv"><div class="ec-lv-lbl">SL</div><div class="ec-lv-val" style="color:#C44040">${e.sl.toFixed(dp)} <span style="font-size:9px;color:var(--txt-dd)">(${e.risk.toFixed(dp)}pts)</span></div></div>
        <div class="ec-lv"><div class="ec-lv-lbl">TP1 ×${e.rr1}R</div><div class="ec-lv-val" style="color:#3DAA62">${e.tp1.toFixed(dp)}</div></div>
        <div class="ec-lv"><div class="ec-lv-lbl">TP2 ×${e.rr2}R</div><div class="ec-lv-val" style="color:#3DAA62">${e.tp2.toFixed(dp)}</div></div>
      </div>
    </div>
    <div class="ec-side">${bdItems.map(b=>{const p=Math.round(b.pts/b.max*100);const bc=b.pts>=b.max*.8?'#3DAA62':b.pts>=b.max*.5?'var(--gold)':'var(--txt-d)';return`<div class="ec-bd"><div class="ec-bd-lbl">${b.lbl}</div><div class="ec-bd-bar"><div class="ec-bd-fill" style="width:${p}%;background:${bc}"></div></div><div class="ec-bd-pts" style="color:${bc}">${b.pts}</div></div>`;}).join('')}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
//  UTILITY
// ═══════════════════════════════════════════════════════════
function showOv(show,msg='',isErr=false){
  const ov=document.getElementById('overlay');ov.classList.toggle('hidden',!show);
  if(msg)document.getElementById('ovSub').textContent=msg;
  document.querySelector('.spinner').style.display=isErr?'none':'block';
  document.querySelector('.ov-title').style.color=isErr?'#C44040':'var(--gold-d)';
  document.querySelector('.ov-title').textContent=isErr?'ERROR':'LOADING';
}
function tick(){
  const now=new Date(),jst=new Date(now.getTime()+(9*60+now.getTimezoneOffset())*60000);
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('clk').textContent=p(jst.getUTCHours())+':'+p(jst.getUTCMinutes())+':'+p(jst.getUTCSeconds());
}
async function copyChart(){
  const btn=document.getElementById('cpBtn');btn.textContent='⏳';btn.className='icon-btn';
  try{
    const area=document.getElementById('chartArea'),vCvs=document.getElementById('vCvs');
    const comp=document.createElement('canvas');comp.width=area.offsetWidth;comp.height=area.offsetHeight;
    const ctx=comp.getContext('2d');ctx.fillStyle='#060504';ctx.fillRect(0,0,comp.width,comp.height);
    const ar=area.getBoundingClientRect();
    for(const c of document.getElementById('vLw').querySelectorAll('canvas')){const cr=c.getBoundingClientRect();try{ctx.drawImage(c,cr.left-ar.left,cr.top-ar.top,cr.width,cr.height);}catch(e){}}
    ctx.drawImage(vCvs,0,0);
    const cfg=INST[currentInst],tf=document.querySelector('.tfrow .tf.on')?.textContent||currentTF;
    ctx.fillStyle='rgba(0,0,0,.60)';ctx.fillRect(0,0,comp.width,28);
    ctx.font='bold 11px JetBrains Mono,monospace';ctx.fillStyle=cfg.accent;ctx.fillText(cfg.name,7,18);
    ctx.font='8px JetBrains Mono,monospace';ctx.fillStyle='#5A4E24';ctx.fillText(tf+'  '+new Date().toLocaleString('ja-JP'),comp.width-165,18);
    comp.toBlob(async blob=>{
      try{await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);btn.textContent='✓';btn.className='icon-btn ok';}
      catch(e){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=cfg.name+'_'+tf+'_'+Date.now()+'.png';a.click();btn.textContent='↓';btn.className='icon-btn ok';}
      setTimeout(()=>{btn.textContent='📋';btn.className='icon-btn';},2500);
    },'image/png');
  }catch(e){btn.textContent='✗';btn.className='icon-btn err';setTimeout(()=>{btn.textContent='📋';btn.className='icon-btn';},2500);}
}

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
initChart();resizeCvs();
tick();setInterval(tick,1000);
// Periodic full recalc
setInterval(()=>{if(VS[currentInst].candles.length){recalc(currentInst);updateMarkers();}},60000);
// Load GOLD first, others staggered
loadData('gold').then(()=>connectRT('gold'));
setTimeout(()=>loadData('btc').then(()=>connectRT('btc')),900);
setTimeout(()=>loadData('silver').then(()=>connectRT('silver')),1800);
</script>
